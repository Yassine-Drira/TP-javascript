  <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
    ${!isDone?`<button class="btn btn-warn" onclick="revealQ(${q.id},${q.ans})">👁️ Révéler</button>`:''}
    <button class="btn ${isBk?'btn-p':'btn-s'}" onclick="toggleBk(${q.id})">${isBk?'🔖 Sauvegardé':'🔖 Sauvegarder'}</button>
  </div>
</div>
<div class="q-nav">${navHtml}</div>
<div style="display:flex;gap:10px;justify-content:center;margin-top:14px">
  <button class="btn btn-s" ${qi<=0?'disabled':''} onclick="ST.qcm.idx=${qi-1};renderQCM()">← Préc</button>
  <button class="btn btn-p" ${qi>=fp.length-1?'disabled':''} onclick="ST.qcm.idx=${qi+1};renderQCM()">Suiv →</button>
</div>`;
}

function answerQ(id,sel,correct){
  if(ST.qcm.answers[id]!==undefined)return;
  ST.qcm.answers[id]=(sel===correct);
  ST.qcm.answers[id+'_sel']=sel;
  ST.save();renderQCM();
  toast(sel===correct?'✅ Correct !':'❌ Incorrect — lisez l\'explication');
}
function revealQ(id,correct){
  ST.qcm.answers[id]=true;ST.qcm.answers[id+'_sel']=correct;
  ST.save();renderQCM();
}
function toggleBk(id){
  if(ST.qcm.bookmarks[id])delete ST.qcm.bookmarks[id];else ST.qcm.bookmarks[id]=true;
  ST.save();renderQCM();
}

/* ===== FLASHCARDS RENDER ===== */
function renderFC() {
  const el = document.getElementById('tab-flashcards'); if(!el) return;
  const chapters = ['all', 'Modèles', 'Stratégie', 'Scrum', 'Agile'];
  let pool = FC.filter(f => ST.fc.chapter === 'all' || f.ch === ST.fc.chapter);
  if (ST.search) {
    const s = ST.search.toLowerCase();
    pool = pool.filter(f => f.front.toLowerCase().includes(s) || f.back.toLowerCase().includes(s));
  }
  if (!ST.fc.shuffled) ST.fc.shuffled = [];
  if (!ST.fc.shuffled.length || (ST.fc.shuffled[0] && !pool.find(f => f.id === ST.fc.shuffled[0].id))) {
    ST.fc.shuffled = shuffle(pool);
  }
  let finalPool = ST.search ? pool : ST.fc.shuffled.filter(f => ST.fc.chapter === 'all' || f.ch === ST.fc.chapter);
  const _srPriority = { rev: 0, none: 1, med: 2, ok: 3 };
  if (!ST.search) {
    finalPool = [...finalPool].sort((a, b) => {
      const pa = _srPriority[ST.fc.states[a.id] || 'none'];
      const pb = _srPriority[ST.fc.states[b.id] || 'none'];
      return pa - pb;
    });
  }
  if (!finalPool.length) {
    const sub = ST.search ? `Aucune flashcard ne correspond à <b>&laquo;${esc(ST.search)}&raquo;</b>.` : 'Aucune flashcard dans cette catégorie.';
    el.innerHTML = `<div class="empty"><span class="empty-icon">🃏</span><div class="empty-title">Aucune flashcard</div><div class="empty-sub">${sub}</div></div>`;
    return;
  }
  const i = Math.min(ST.fc.idx, finalPool.length - 1);
  const f = finalPool[i];
  const st = ST.fc.states[f.id] || 'none';
  const mastered = Object.values(ST.fc.states).filter(v => v === 'ok').length;
  const stateLabel = { rev: '❌ À revoir', med: '∼ Moyen', ok: '✅ Maîtrisée', none: '🆕 Nouvelle' }[st];
  const stateColor = { rev: 'var(--err)', med: 'var(--warn)', ok: 'var(--ok)', none: 'var(--txt-dim)' }[st];
  const revCount = finalPool.filter(f => ST.fc.states[f.id] === 'rev').length;
  const srHint = revCount > 0 ? `⚠️ ${revCount} carte${revCount > 1 ? 's' : ''} à revoir en tête de file` : '✅ Aucune carte à revoir';

  const chColors = {
    'Modèles': { c: '#06b6d4', bg: 'rgba(6,182,212,0.18)', icon: '🧩' },
    'Stratégie': { c: '#a855f7', bg: 'rgba(168,85,247,0.18)', icon: '🎯' },
    'Scrum': { c: '#10b981', bg: 'rgba(16,185,129,0.18)', icon: '🛡️' },
    'Agile': { c: '#f59e0b', bg: 'rgba(245,158,11,0.18)', icon: '⚡' }
  };
  const colObj = chColors[f.ch] || { c: '#3b82f6', bg: 'rgba(59,130,246,0.18)', icon: '🃏' };

  el.innerHTML = `
<div style="font-size:12px;color:${revCount > 0 ? 'var(--warn)' : 'var(--ok)'};margin-bottom:12px;padding:6px 10px;background:${revCount > 0 ? 'rgba(245,158,11,.08)' : 'rgba(34,197,94,.08)'};border-radius:6px;border-left:3px solid ${revCount > 0 ? 'var(--warn)' : 'var(--ok)'}">
  🧠 Répétition espacée active &mdash; ${srHint}
</div>
<div class="dash" style="margin-bottom:16px">
  <div class="stat"><div class="v">${pool.length}</div><div class="l">Total</div></div>
  <div class="stat"><div class="v" style="color:var(--ok)">${mastered}</div><div class="l">Maîtrisées</div></div>
  <div class="stat"><div class="v" style="color:var(--warn)">${Object.values(ST.fc.states).filter(v => v === 'med').length}</div><div class="l">Moyennes</div></div>
  <div class="stat"><div class="v" style="color:var(--err)">${Object.values(ST.fc.states).filter(v => v === 'rev').length}</div><div class="l">À revoir</div></div>
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
  ${chapters.map(c => {
    const col = chColors[c] ? chColors[c].c : 'var(--accent)';
    const on = (ST.fc.chapter === c);
    return `<button class="f-btn" style="border-color:${on ? col : 'var(--border)'}; background:${on ? col : 'transparent'}; color:${on ? '#000' : 'var(--txt-dim)'}; font-weight:${on ? '700' : '600'}; box-shadow:${on ? '0 0 14px ' + col + '80' : 'none'}" onclick="setFCh('${c}')">${c === 'all' ? '🌟 Tous' : (chColors[c] ? chColors[c].icon + ' ' : '') + c}</button>`;
  }).join('')}
  <button class="btn btn-s" onclick="shuffleFC()" style="margin-left:auto">🔀 Mélanger</button>
</div>
<div style="text-align:center;color:var(--txt-dim);font-size:13px;margin-bottom:8px">${i + 1} / ${finalPool.length} — Cliquer pour retourner</div>
<div class="fc-arena">
  <div class="flashcard" id="fc-card" onclick="flipFC()" style="box-shadow:0 12px 40px ${colObj.bg}">
    <div class="fc-face fc-front" style="border:2px solid ${colObj.c}60; background:linear-gradient(145deg, var(--panel), ${colObj.bg}); box-shadow:inset 0 1px 1px rgba(255,255,255,0.1)">
      <div class="fc-lbl" style="color:${colObj.c}; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:8px; text-shadow:0 0 10px ${colObj.c}60">
        <span style="font-size:18px">${colObj.icon}</span> Question &mdash; ${f.ch}
      </div>
      <div style="font-size:11px;font-weight:700;color:${stateColor};margin-bottom:12px;background:rgba(0,0,0,0.4);padding:3px 12px;border-radius:12px;display:inline-block">${stateLabel}</div>
      <div class="fc-txt" style="font-size:18px; font-weight:600; text-shadow:0 2px 10px rgba(0,0,0,0.65)">${hl(f.front)}</div>
    </div>
    <div class="fc-face fc-back" style="border:2px solid ${colObj.c}; background:linear-gradient(145deg, #09090b, ${colObj.c}35); box-shadow:inset 0 1px 1px rgba(255,255,255,0.1)">
      <div class="fc-lbl" style="color:${colObj.c}; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:8px; text-shadow:0 0 10px ${colObj.c}60">
        <span style="font-size:18px">💡</span> Réponse
      </div>
      <div class="fc-txt" style="font-size:16px; font-weight:500; margin-bottom:12px; text-shadow:0 2px 10px rgba(0,0,0,0.65)">${hl(f.back).replace(/\n/g,'<br>')}</div>
    </div>
  </div>
</div>
<div class="fc-status">
  <button class="fcs-btn fcs-review" onclick="setFCSt(${f.id},'rev')">❌ À revoir</button>
  <button class="fcs-btn fcs-med" onclick="setFCSt(${f.id},'med')">~ Moyen</button>
  <button class="fcs-btn fcs-ok" onclick="setFCSt(${f.id},'ok')">✅ Maîtrisé</button>
</div>
<div style="display:flex;justify-content:center;gap:12px;margin-top:14px">
  <button class="btn btn-s" onclick="prevFC()" ${i === 0 ? 'disabled' : ''}>← Préc</button>
  <button class="btn btn-p" onclick="nextFC()" ${i === finalPool.length - 1 ? 'disabled' : ''}>Suiv →</button>
</div>`;
}

function flipFC() { const card = document.getElementById('fc-card'); if (card) card.classList.toggle('flipped'); }
function nextFC() { const pool = FC.filter(f => ST.fc.chapter === 'all' || f.ch === ST.fc.chapter); if (ST.fc.idx < pool.length - 1) { ST.fc.idx++; renderFC(); } }
function prevFC() { if (ST.fc.idx > 0) { ST.fc.idx--; renderFC(); } }
function setFCh(c) { ST.fc.chapter = c; ST.fc.idx = 0; ST.fc.shuffled = []; renderFC(); }
function shuffleFC() { ST.fc.shuffled = []; ST.fc.idx = 0; renderFC(); }
function setFCSt(id, s) { ST.fc.states[id] = s; ST.save(); updateStreak(); renderFC(); }

/* ===== CHEAT SHEET RENDER ===== */
function renderCS() {
  const el = document.getElementById('tab-cheatsheet'); if(!el) return;
  const keys = Object.keys(CS);
  if (!keys.length) {
    el.innerHTML = `<div class="empty"><span class="empty-icon">📜</span><div class="empty-title">Aucun Cheat Sheet</div><div class="empty-sub">Les fiches de révision seront ajoutées bientôt.</div></div>`;
    return;
  }
  const idx = `<div class="jump-idx" style="display:flex; gap:8px; flex-wrap:wrap; padding:16px; background:var(--panel); border:1px solid var(--border); border-radius:12px; margin-bottom:24px; box-shadow: 0 8px 32px rgba(0,0,0,0.3)">
    ${keys.map(k => {
      const c = CS[k];
      const bg = c.bg || (c.color.startsWith('#') ? c.color + '18' : 'rgba(59,130,246,0.18)');
      return `<button class="j-link" style="border:1px solid ${c.color}40; background:${bg}; color:${c.color}; font-weight:600; padding:6px 14px; border-radius:8px; display:flex; align-items:center; gap:8px; transition:all .2s;" onmouseover="this.style.boxShadow='0 0 14px ${c.color}60'; this.style.borderColor='${c.color}'" onmouseout="this.style.boxShadow='none'; this.style.borderColor='${c.color}40'" onclick="document.getElementById('cs-${k}').scrollIntoView({behavior:'smooth'})"><span style="font-size:15px">${c.icon}</span> ${esc(c.title.split('—')[0].trim())}</button>`;
    }).join('')}
  </div>`;
  
  let html = idx + '<div class="cheat-grid">';
  keys.forEach(k => {
    const c = CS[k];
    const s = ST.search ? ST.search.toLowerCase() : '';
    const items = c.items.filter(it => !s || it.k.toLowerCase().includes(s) || it.v.toLowerCase().includes(s));
    
    const code = c.code || '';
    if (ST.search && items.length === 0 && !code.toLowerCase().includes(s)) return;
    
    const bg = c.bg || (c.color.startsWith('#') ? c.color + '18' : 'rgba(59,130,246,0.18)');
    
    html += `<div class="cc" id="cs-${k}" style="border-top:4px solid ${c.color}; border-radius:10px; box-shadow:0 4px 25px ${bg}; transition:all .3s;" onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 8px 35px ${c.color}30'" onmouseout="this.style.transform='none'; this.style.boxShadow='0 4px 25px ${bg}'">
      <div class="cc-h" style="background:linear-gradient(135deg, var(--panel) 30%, ${bg}); border-bottom:1px solid rgba(255,255,255,0.06); padding:12px 16px;">
        <h3 style="color:${c.color}; font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px; text-shadow:0 0 10px ${c.color}40;"><span style="font-size:18px">${c.icon}</span> ${esc(c.title)}</h3>
        <button class="copy-btn" style="border:1px solid ${c.color}40; color:${c.color}; background:${bg}; padding:4px 10px; border-radius:6px; font-weight:600;" onmouseover="this.style.background='${c.color}'; this.style.color='#000'" onmouseout="this.style.background='${bg}'; this.style.color='${c.color}'" onclick="copyCS('${k}')">📋 Copier</button>
      </div>
      <div class="cc-b" style="padding:14px 16px;">
        ${items.map((it, iNum) => `<div class="ci" style="border-bottom:1px solid rgba(255,255,255,0.04); padding:8px 4px; background:${iNum % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.015)'}; border-radius:4px;">
          <span class="ci-k" style="color:var(--txt2); font-weight:600; font-size:13px;">${hl(it.k)}</span>
          <span class="ci-v ac" style="color:${c.color}; font-weight:700; font-size:13px; text-shadow:0 0 8px ${c.color}20;">${hl(it.v)}</span>
        </div>`).join('')}
        ${c.code && (!ST.search || c.code.toLowerCase().includes(s)) ? `<div class="cs" style="border-left:3px solid ${c.color}; background:rgba(0,0,0,0.4); color:var(--txt); padding:10px; font-size:12px; border-radius:0 6px 6px 0; margin-top:10px;">${esc(c.code)}</div>` : ''}
      </div>
    </div>`;
  });
  html += '</div>';
  
  if (html.replace(idx, '') === '<div class="cheat-grid"></div>') {
    el.innerHTML = `<div class="empty"><span class="empty-icon">🔍</span><div class="empty-title">Aucun concept trouvé</div></div>`;
  } else {
    el.innerHTML = html;
  }
}

function copyCS(k){
  const c = CS[k];
  const txt = c.items.map(i => i.k + ': ' + i.v).join('\n') + (c.code ? '\n\n' + c.code : '');
  navigator.clipboard.writeText(txt).then(() => toast('✓ Copié dans le presse-papiers'));
}

/* ===== TRAPS RENDER ===== */
function renderTraps(){
  const el=document.getElementById('tab-traps');if(!el)return;
  let pool=TRAPS;
  if(ST.search){const s=ST.search;pool=pool.filter(t=>t.wrong.toLowerCase().includes(s)||t.right.toLowerCase().includes(s)||t.rule.toLowerCase().includes(s));}
  if(pool.length===0){el.innerHTML='<div class="empty"><span class="empty-icon">🔍</span><div class="empty-title">Aucun piège trouvé</div></div>';return;}
  const sev={3:'🔴',2:'🟡',1:'🟢'};
  el.innerHTML=`<div class="trap-grid">${pool.map(t=>`
<div class="trap-card">
  <div class="trap-header"><span class="trap-cat">${sev[t.sev]||'🔴'} ${esc(t.cat)}</span>${chTag(t.ch)}</div>
  <div class="trap-wrong"><div class="trap-label">❌ Idée reçue</div><div>${esc(t.wrong)}</div></div>
  <div class="trap-right"><div class="trap-label">✅ La réalité</div><div>${hl(t.right)}</div></div>
  ${t.why?`<div class="trap-why"><strong>Pourquoi ?</strong> ${esc(t.why)}</div>`:''}
  <div class="trap-rule">📌 <strong>Règle d'or :</strong> ${hl(t.rule)}</div>
</div>`).join('')}</div>`;
}

  </script>
</body>
