      { id: 96, ch: "BMM", diff: "hard", domain: "Stratégie", q: "Dans le BMM, la 'Stratégie' se décline en deux types. Lesquels ?", opts: ["Offensive et Défensive", "Stratégique (Long Terme) et Tactique (Court Terme)", "Interne et Externe", "Humaine et Technologique"], ans: 1, expl: "La stratégie BMM se décline en : (1) Stratégique = objectifs Long Terme (vision pluriannuelle) et (2) Tactique = objectifs Court Terme (actions trimestrielles/annuelles concrètes).", trap: "" },
      { id: 97, ch: "Scrum", diff: "hard", domain: "Scrum", q: "L'équipe Dev refuse de faire du pair programming car 'c'est du temps perdu'. En tant que SM, comment réagissez-vous ?", opts: ["Imposer le pair programming", "Présenter les bénéfices (qualité, transfert de connaissances) et laisser l'équipe décider — c'est dans leur autonomie technique", "Demander au PO de l'inscrire dans les US", "Supprimer cette pratique du backlog"], ans: 1, expl: "Le SM éduque et facilite — il ne dicte pas les pratiques techniques. Il peut présenter les avantages (réduction bugs, partage knowledge) mais laisse l'équipe décider. L'autonomie technique est sacrée.", trap: "" },
      { id: 98, ch: "Agile", diff: "med", domain: "Modèles", q: "Le cycle PDCA (Plan-Do-Check-Act) est lié à Agile car :", opts: ["Il est utilisé uniquement dans l'industrie manufacturière", "Il représente le même cycle d'amélioration continue que la Rétro Scrum", "Il remplace le Sprint Planning", "Il n'a aucun lien avec Agile"], ans: 1, expl: "PDCA = Plan (Sprint Planning) → Do (Sprint) → Check (Review + Rétro) → Act (amélioration). C'est la boucle d'apprentissage qui sous-tend tous les frameworks Agile.", trap: "" },
      { id: 99, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le 'Product Goal' en Scrum 2020 est :", opts: ["Synonyme du Sprint Goal", "L'objectif long terme du produit qui guide le Product Backlog — tous les sprints contribuent à l'atteindre", "Le nombre de features à livrer cette année", "La satisfaction client mesurée en NPS"], ans: 1, expl: "Scrum 2020 introduit le Product Goal = objectif long terme du produit. Le Product Backlog existe pour l'atteindre. Chaque sprint doit contribuer à progresser vers ce goal.", trap: "" },
      { id: 100, ch: "Scrum", diff: "hard", domain: "Scrum", q: "En tant que Scrum Master, vous êtes dans une organisation où le management annule régulièrement des sprints pour changer les priorités. Quelle est votre action stratégique ?", opts: ["Accepter — le management a toujours raison", "Refuser systématiquement en citant le guide Scrum", "Travailler avec le management pour comprendre leurs besoins, améliorer la communication sur le Sprint Goal et les inviter à la Sprint Review", "Démissionner de votre rôle de SM"], ans: 2, expl: "Le SM est un agent de changement organisationnel. Il doit éduquer le management sur l'impact des annulations de sprint (coût, démotivation) et créer des structures de communication qui réduisent ce besoin.", trap: "Piège : 'Refuser en citant le guide Scrum' est dogmatique — le SM est un coach, pas un policier." },
      { id: 101, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Lors de la Rétrospective, un développeur soulève un problème interpersonnel grave avec un autre développeur. Que fait le SM ?", opts: ["Ignorer car hors scope Scrum", "Documenter et remettre au DRH", "Faciliter une conversation constructive entre les parties concernées — la sécurité psychologique de l'équipe est une responsabilité SM", "Sanctionner les deux"], ans: 2, expl: "La sécurité psychologique (psychological safety) est une condition de base pour une équipe performante. Le SM crée cet espace et facilite la résolution constructive des conflits interpersonnels.", trap: "" },
      { id: 102, ch: "Agile", diff: "med", domain: "Modèles", q: "Le principe Agile 'Livrer fréquemment des logiciels opérationnels, avec des cycles allant de quelques semaines à quelques mois' signifie :", opts: ["Déployer en production tous les jours obligatoirement", "Livrer des incréments de valeur à intervalles réguliers et courts", "Faire des releases uniquement en fin d'année", "Livrer seulement quand tout est parfait"], ans: 1, expl: "Ce principe Agile prescrit des cycles courts de livraison (sprints 2-4 semaines) produisant un incrément de valeur réel et potentiellement utilisable. Pas forcément déployé en prod, mais livrable.", trap: "" },
      { id: 103, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le PO présente au Sprint Planning une US sans critères d'acceptation définis. Que fait l'équipe Dev ?", opts: ["L'accepter et définir eux-mêmes les critères", "La refuser pour ce sprint jusqu'à ce que les critères soient définis (DoR non atteinte)", "La décomposer en tâches sans critères", "Demander au SM de décider"], ans: 1, expl: "Sans critères d'acceptation, la DoR (Definition of Ready) n'est pas atteinte. L'US ne peut pas entrer dans le sprint. L'équipe demande au PO de les définir en Refinement d'abord.", trap: "" },
      { id: 104, ch: "Scrum", diff: "med", domain: "Scrum", q: "Le Daily Scrum se structure autour de 3 questions (selon l'ancienne approche) ou de l'objectif du sprint. Les 3 questions traditionnelles sont :", opts: ["Hier/Aujourd'hui/Demain", "Qu'ai-je fait hier ? Que vais-je faire aujourd'hui ? Quels obstacles rencontré-je ?", "Combien d'heures ? Quels bugs ? Quel avancement ?", "Objectifs/Résultats/Risques"], ans: 1, expl: "Les 3 questions traditionnelles du Daily : (1) Qu'ai-je fait hier pour progresser vers le Sprint Goal ? (2) Que vais-je faire aujourd'hui ? (3) Quels obstacles m'empêchent d'avancer ?", trap: "Piège : Scrum 2020 n'impose plus ces 3 questions — il demande de se focaliser sur le Sprint Goal. Mais les 3 questions restent un bon outil." },
      { id: 105, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Un développeur termine ses tâches et propose d'aider sur une autre tâche qu'il ne maîtrise pas bien. En Scrum, comment devrait-on réagir ?", opts: ["Lui interdire — chacun à son domaine", "L'encourager — Scrum valorise les équipes cross-fonctionnelles et le partage de compétences", "Le forcer à prendre une nouvelle US seul", "Le laisser prendre des vacances"], ans: 1, expl: "Scrum valorise les équipes cross-fonctionnelles et l'apprentissage collectif. Un développeur qui aide sur une tâche hors de sa zone de confort renforce la résilience de l'équipe et réduit les silos.", trap: "" },
      { id: 106, ch: "Waterfall", diff: "hard", domain: "Modèles", q: "Le modèle Waterfall a été décrit par Winston Royce en 1970. Quelle ironie historique est souvent méconnue ?", opts: ["Royce était contre le Waterfall", "Royce lui-même qualifiait ce modèle de 'risqué' et recommandait des itérations — sa publication était plus nuancée que son modèle linéaire simplifié", "Royce n'a jamais existé", "Le Waterfall est une invention française"], ans: 1, expl: "Ironie historique : Royce (1970) présentait le modèle linéaire ET mettait en garde contre ses risques, recommandant des itérations et une phase de prototype. La version simplifiée 'Waterfall' a été extrapolée.", trap: "" },
      { id: 107, ch: "Agile", diff: "med", domain: "Modèles", q: "Le 'refactoring' en développement Agile est :", opts: ["L'écriture de fonctionnalités supplémentaires", "La restructuration du code existant pour améliorer sa lisibilité et maintenabilité sans changer son comportement", "La correction de bugs en production", "La réécriture complète du système"], ans: 1, expl: "Refactoring = améliorer la structure interne du code sans modifier le comportement externe. Essentiel pour gérer la dette technique et maintenir la vélocité à long terme.", trap: "" },
      { id: 108, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le 'Impediment Backlog' est géré par :", opts: ["Le Product Owner", "L'équipe Dev", "Le Scrum Master", "Le management"], ans: 2, expl: "Le SM maintient et gère l'Impediment Backlog (liste des obstacles). Il est responsable d'éliminer ces blocages pour que l'équipe puisse avancer.", trap: "" },
      { id: 109, ch: "BMM", diff: "hard", domain: "Stratégie", q: "Dans le BMM, quelle est la relation entre 'Extrémité' (End) et 'Moyen' (Mean) ?", opts: ["Ce sont des synonymes", "L'Extrémité définit CE QU'ON VEUT ATTEINDRE (Vision/Mission/Objectifs) ; le Moyen définit COMMENT on l'atteint (Stratégie/Règles/Ressources)", "Le Moyen précède toujours l'Extrémité", "L'Extrémité définit les contraintes légales"], ans: 1, expl: "BMM structure : Ends (Extrémités) = Vision, Mission, Objectifs. Means (Moyens) = Stratégie, Tactique, Règles, Politiques, Ressources. Les Ends définissent le 'Quoi', les Means le 'Comment'.", trap: "" },
      { id: 110, ch: "Ishikawa", diff: "hard", domain: "Stratégie", q: "Dans l'Ishikawa, qu'est-ce que la technique des '5 Pourquoi' (5 Whys) ?", opts: ["Poser 5 questions aux stakeholders", "Demander 'Pourquoi ?' répétitivement pour aller de la cause apparente à la cause racine", "Identifier 5 solutions pour chaque problème", "Évaluer les solutions sur 5 critères"], ans: 1, expl: "Les 5 Pourquoi = technique complémentaire à l'Ishikawa : demander 'Pourquoi ?' à chaque cause identifiée pour creuser jusqu'à la vraie cause racine (généralement atteinte au 5ème niveau).", trap: "" },
      { id: 111, ch: "Scrum", diff: "hard", domain: "Scrum", q: "L'équipe a une vélocité de 20 SP mais le PO veut qu'elle livre 35 SP ce sprint 'car c'est urgent'. En tant que SM, que faites-vous ?", opts: ["Accepter — l'urgence justifie l'effort", "Négocier avec l'équipe en private", "Rappeler au PO que la vélocité est basée sur la capacité réelle — surcharger crée de la dette technique et détériore la qualité", "Diviser le sprint en deux mini-sprints"], ans: 2, expl: "Surcharger l'équipe → heures sup → fatigue → bugs → dette technique. Le SM protège l'équipe de la pression externe. La solution : prioriser les 20 SP les plus importants.", trap: "Piège : 'faire des heures sup pour urgence' est un anti-pattern — ça crée une culture de sur-engagement non durable." },
      { id: 112, ch: "Scrum", diff: "med", domain: "Scrum", q: "Qu'est-ce qu'un 'Spike' en Agile ?", opts: ["Un défaut critique en production", "Une User Story de recherche/exploration pour réduire l'incertitude technique avant d'estimer une US complexe", "Un sprint d'urgence sans planification", "Un bug non résolu dans le backlog"], ans: 1, expl: "Spike = US technique ou de recherche avec une durée fixe (timebox) pour explorer une solution technique ou réduire une incertitude. Le résultat est de la connaissance, pas un livrable fonctionnel.", trap: "" },
      { id: 113, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Lors de l'Estimation Agile, la suite de Fibonacci (1,2,3,5,8,13,21...) est utilisée car :", opts: ["C'est plus facile à mémoriser", "Elle reflète l'incertitude croissante : plus une tâche est grande, moins l'estimation est précise — l'écart entre les valeurs augmente", "Elle est plus précise que les heures", "C'est une convention arbitraire"], ans: 1, expl: "Fibonacci reflète l'incertitude naturelle : une story de 1 SP est très précise. Une story de 21 SP a une grande incertitude. L'écart croissant entre valeurs force à décomposer les grosses stories.", trap: "" },
      { id: 114, ch: "Agile", diff: "hard", domain: "Modèles", q: "La 'Sécurité Psychologique' (Psychological Safety) dans une équipe Agile, définie par Amy Edmondson, signifie :", opts: ["Absence de stress dans l'équipe", "La capacité des membres à prendre des risques interpersonnels (parler, questionner, échouer) sans crainte de punition ou d'humiliation", "Le droit de ne pas travailler sous pression", "L'anonymat des communications d'équipe"], ans: 1, expl: "Sécurité psychologique = pilier des équipes haute performance. Les membres osent parler franchement, signaler des problèmes, expérimenter et échouer sans crainte. Condition sine qua non d'une vraie Rétro.", trap: "" },
      { id: 115, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le PO veut modifier le format de toutes les User Stories pour les rendre plus détaillées (5 pages chacune). En tant que SM, que faites-vous ?", opts: ["Accepter — plus de détails est toujours mieux", "Refuser catégoriquement", "Expliquer que les US sont intentionnellement légères — les détails viennent lors du Refinement et Sprint Planning, pas dans le format", "Demander à l'équipe de voter"], ans: 2, expl: "Les User Stories sont intentionnellement courtes : elles sont une invitation à une conversation, pas un document complet. Les détails émergent lors du Refinement et du Sprint Planning.", trap: "Piège : une US de 5 pages ressemble à une spécification fonctionnelle Waterfall." },
      { id: 116, ch: "Waterfall", diff: "med", domain: "Modèles", q: "Dans un projet Waterfall, le document 'Spécification des Exigences Logicielles' (SRS) est produit lors de quelle phase ?", opts: ["Conception", "Analyse des Besoins / Expression des besoins", "Tests", "Déploiement"], ans: 1, expl: "Le SRS (Software Requirements Specification) est produit lors de la phase d'analyse des besoins. Il documente toutes les exigences fonctionnelles et non-fonctionnelles et sert de référence pour toutes les phases suivantes.", trap: "" },
      { id: 117, ch: "Spirale", diff: "hard", domain: "Modèles", q: "Dans le modèle en Spirale de Boehm, l'expression 'Risk-Driven' signifie :", opts: ["Le projet est risqué par nature", "Chaque cycle est guidé par l'identification et la mitigation des risques principaux — pas par un plan prédéfini", "Les risques sont ignorés pour avancer plus vite", "Le chef de projet assume tous les risques"], ans: 1, expl: "Le modèle de Boehm est dit 'Risk-Driven' car la direction de chaque cycle est guidée par les risques identifiés. On traite d'abord les risques les plus critiques. C'est sa différence fondamentale.", trap: "" },
      { id: 118, ch: "Agile", diff: "hard", domain: "Modèles", q: "Le 'Feature Team' (équipe fonctionnalité) vs 'Component Team' (équipe composant) : quelle est la recommandation Agile/LeSS ?", opts: ["Component Teams sont préférées car plus spécialisées", "Feature Teams sont préférées car elles livrent de la valeur end-to-end sans dépendances", "Les deux sont équivalentes", "Component Teams sont Agile, Feature Teams sont Waterfall"], ans: 1, expl: "LeSS et Agile recommandent les Feature Teams : une équipe complète qui peut livrer une fonctionnalité de bout en bout (UI → backend → DB) sans attendre d'autres équipes. Réduit les dépendances.", trap: "" },
      { id: 119, ch: "Scrum", diff: "med", domain: "Scrum", q: "La 'Product Vision' en Scrum sert à :", opts: ["Remplacer le Product Backlog", "Définir la direction long terme du produit pour aligner toute l'équipe et guider les décisions de priorisation", "Décrire chaque feature en détail", "Documenter les bugs connus"], ans: 1, expl: "La Product Vision = boussole stratégique du produit. Elle aligne l'équipe sur le 'Pourquoi' et guide les décisions quotidiennes du PO sur les priorités. Peut être exprimée avec un elevator pitch ou un Product Box.", trap: "" },
      { id: 120, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Quelle est la PRINCIPALE différence entre 'Agile' et 'Scrum' ?", opts: ["Ce sont des synonymes", "Agile est un ensemble de valeurs et principes (Manifeste 2001) ; Scrum est un framework spécifique qui implémente les principes Agile", "Scrum est plus complet qu'Agile", "Agile est réservé aux grandes entreprises"], ans: 1, expl: "Agile = philosophie, valeurs, principes (12 principes du Manifeste Agile 2001). Scrum = framework concret avec rôles, cérémonies, artifacts qui implémente ces principes. Scrum est Agile, Agile n'est pas forcément Scrum.", trap: "" },
      { id: 121, ch: "Scrum", diff: "hard", domain: "Scrum", q: "En tant que PO, vous devez choisir entre 3 features : A (valeur 100, effort 20), B (valeur 80, effort 10), C (valeur 60, effort 5). Quelle est la MEILLEURE priorisation selon la valeur/effort ?", opts: ["A, B, C", "C, B, A", "B, A, C", "C, A, B"], ans: 1, expl: "ROI = valeur/effort : C=12, B=8, A=5. Prioriser par ROI décroissant : C (12) > B (8) > A (5). La priorité est C, B, A. On livre le maximum de valeur avec le minimum d'effort d'abord.", trap: "Piège : ne pas confondre 'grande valeur' avec 'meilleur ROI'. Une feature à forte valeur ET fort effort peut avoir un ROI inférieur." },
      { id: 122, ch: "Agile", diff: "hard", domain: "Modèles", q: "Le TDD (Test-Driven Development) impose l'ordre suivant :", opts: ["Coder → Tester → Refactorer", "Tester → Coder → Refactorer (Red-Green-Refactor)", "Concevoir → Coder → Tester", "Tester → Concevoir → Coder"], ans: 1, expl: "TDD = Red-Green-Refactor : (1) Écrire un test qui ÉCHOUE (Red), (2) Écrire le minimum de code pour que le test PASSE (Green), (3) Améliorer le code (Refactor) sans casser les tests.", trap: "" },
      { id: 123, ch: "Scrum", diff: "hard", domain: "Scrum", q: "L'équipe Scrum a livré l'incrément mais des bugs critiques sont découverts en production 2 jours après. Qui est responsable ?", opts: ["Le Scrum Master pour avoir mal facilité", "Le PO pour avoir mal défini les critères", "L'équipe Dev pour avoir mal testé — mais la Rétro traitera comment améliorer la DoD pour éviter que cela se reproduise", "Les testeurs QA externes"], ans: 2, expl: "En Scrum, l'équipe Dev est responsable de la qualité. Si des bugs passent en prod, c'est que la DoD était insuffisante (pas de tests de régression ?). La Rétro doit renforcer la DoD.", trap: "Piège : 'blâmer' est anti-Agile. On cherche des améliorations systémiques, pas des coupables." },
      { id: 124, ch: "Scrum", diff: "med", domain: "Scrum", q: "Un 'Stakeholder' en Scrum est :", opts: ["Uniquement le client payant", "Tout individu ou groupe affecté par le produit ou ayant un intérêt dans son succès", "Les membres de l'équipe Scrum", "Le management de l'entreprise seulement"], ans: 1, expl: "Stakeholders = toute personne ayant un intérêt dans le produit : utilisateurs finaux, clients, management, équipes support, régulateurs, partenaires. Ils participent à la Sprint Review.", trap: "" },
      { id: 125, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le 'Three Amigos' en Agile réunit :", opts: ["PO, SM, et Manager", "Business Analyst, Developer, Tester — pour discuter une US avant développement", "Les 3 développeurs les plus seniors", "PO, SM, Équipe Dev pour la Rétro"], ans: 1, expl: "Three Amigos = technique de collaboration : un représentant Business (PO/BA), un Developer, un Tester se réunissent pour discuter une US sous 3 angles différents avant développement. Réduit les malentendus.", trap: "" },
      { id: 126, ch: "Agile", diff: "hard", domain: "Modèles", q: "Le cadre Cynefin définit 4 domaines de problèmes. Dans lequel Scrum est-il le plus adapté ?", opts: ["Simple (obvious)", "Compliqué", "Complexe", "Chaotique"], ans: 2, expl: "Cynefin : Complexe = cause-effet non évident a priori, nécessite expérimentation. Scrum est conçu pour ce domaine (besoins flous, technologie incertaine). Le Waterfall convient au Compliqué (expertise suffisante).", trap: "Piège : 'Compliqué' = difficile mais résolvable par experts → Waterfall. 'Complexe' = émergent → Scrum." },
      { id: 127, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Un développeur découvre que le SM prend des décisions architecturales sans consulter l'équipe. Quelle est la bonne réaction ?", opts: ["Accepter car le SM a l'expérience", "Signaler au PO", "Soulever le sujet en Rétrospective — le SM ne devrait pas prendre de décisions techniques", "Ignorer"], ans: 2, expl: "Le SM ne prend PAS de décisions techniques — c'est le rôle de l'équipe Dev. Si le SM outrepasse son rôle, la Rétro est le lieu approprié pour en discuter et rétablir les bonnes pratiques.", trap: "" },
      { id: 128, ch: "Scrum", diff: "med", domain: "Scrum", q: "La 'capacité' de l'équipe pour un sprint est calculée en :", opts: ["Nombre de membres × vitesse maximale théorique", "Heures disponibles (en soustrayant congés, réunions, autres activités) traduites en SP selon la vélocité historique", "Nombre de features demandées par le PO", "Estimation du SM"], ans: 1, expl: "Capacité sprint = heures disponibles réelles de chaque membre (moins congés, réunions, formations) converties en SP basés sur la vélocité historique. C'est la base du Sprint Planning.", trap: "" },
      { id: 129, ch: "Scrum", diff: "hard", domain: "Scrum", q: "L'équipe livre un incrément fonctionnel mais pas encore déployé en production. Peut-il être considéré comme 'Done' ?", opts: ["Non — 'Done' implique toujours le déploiement en production", "Oui — si la DoD de l'équipe ne requiert pas le déploiement en production", "Seulement si le PO approuve", "Non — 'Done' = utilisateurs en production"], ans: 1, expl: "'Done' est défini par la DoD de l'équipe. Si la DoD dit 'potentiellement déployable' (pas forcément déployé), l'incrément peut être Done sans être en production. La DoD définit ce critère.", trap: "Piège : beaucoup confondent 'Done' et 'Déployé en production'." },
      { id: 130, ch: "Agile", diff: "hard", domain: "Modèles", q: "Le 'Manifeste Agile' (2001) a été signé par combien de personnes et dans quelle ville ?", opts: ["10 personnes à Paris", "17 personnes à Snowbird (Utah, USA)", "7 personnes à Silicon Valley", "25 personnes à Londres"], ans: 1, expl: "Le Manifeste Agile a été signé par 17 représentants à Snowbird, Utah en février 2001. Parmi eux : Kent Beck (XP), Ken Schwaber (Scrum), Ward Cunningham (Wiki), Martin Fowler.", trap: "Piège historique souvent demandé en certification." },
      { id: 131, ch: "BMM", diff: "hard", domain: "Stratégie", q: "Dans le BMM, une 'Directive Métier' peut être soit une Politique soit une Règle. Quelle est la caractéristique principale d'une Politique ?", opts: ["Elle est toujours chiffrée", "Elle oriente et guide sans spécifier comment — elle donne une direction générale", "Elle s'applique uniquement aux systèmes informatiques", "Elle est définie par l'équipe Dev"], ans: 1, expl: "Politique BMM = directive générale d'orientation (ex: 'assurer la confidentialité des données clients'). Elle ne dit pas COMMENT — c'est le rôle des Règles qui en découlent (ex: 'crypter toutes les données AES-256').", trap: "" },
      { id: 132, ch: "Scrum", diff: "hard", domain: "Scrum", q: "L'équipe Scrum utilise un tableau Kanban pour visualiser le Sprint Backlog. Est-ce conforme à Scrum ?", opts: ["Non — Scrum impose un format de Sprint Backlog spécifique", "Oui — Scrum ne prescrit pas le format du Sprint Backlog, seulement son contenu", "Seulement si le SM l'approuve", "Non — le tableau Kanban est réservé à la méthode Kanban"], ans: 1, expl: "Scrum ne prescrit pas le format du Sprint Backlog. Un tableau Kanban (To Do / In Progress / Done) est un excellent outil de visualisation compatible avec Scrum.", trap: "" },
      { id: 133, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Un PO tente de modifier les priorités du Product Backlog pendant le Sprint Planning en cours. Quelle est la MEILLEURE réaction ?", opts: ["Accepter immédiatement", "Interrompre et replanifier tout", "Le SM rappelle que le Sprint Planning est le moment pour sélectionner, pas pour modifier les priorités — les nouvelles priorités seront traitées dans le prochain sprint", "Voter en équipe"], ans: 2, expl: "Les priorités du Product Backlog peuvent être modifiées AVANT le Sprint Planning mais pas pendant. Pendant le Sprint Planning, l'équipe sélectionne parmi les items déjà priorisés.", trap: "" },
      { id: 134, ch: "Agile", diff: "med", domain: "Modèles", q: "BDD (Behavior-Driven Development) est une extension de TDD qui :", opts: ["Remplace complètement TDD", "Utilise un langage naturel (Gherkin : Given/When/Then) pour décrire les comportements attendus, compréhensibles par tous", "Ne nécessite pas de tests automatisés", "Est réservé aux projets backend"], ans: 1, expl: "BDD = TDD exprimé en langage naturel (Gherkin). Given (contexte), When (action), Then (résultat attendu). Compréhensible par le PO, les développeurs ET les testeurs. Favorise la collaboration.", trap: "" },
      { id: 135, ch: "Scrum", diff: "hard", domain: "Scrum", q: "L'équipe propose d'augmenter la durée du sprint de 2 à 4 semaines 'pour avoir plus de temps'. En tant que SM, quel conseil donnez-vous ?", opts: ["Accepter — plus de temps = mieux", "Refuser catégoriquement", "Explorer les VRAIES raisons (stories trop grandes ? planification insuffisante ?) avant de changer la durée — les sprints courts ont des avantages (feedback rapide)", "Demander au PO de décider"], ans: 2, expl: "Avant d'allonger les sprints, le SM explore les causes racines : stories trop complexes (à décomposer), sous-estimation (améliorer l'estimation), ou vraie nécessité. Sprints courts = feedback plus rapide.", trap: "" },
      { id: 136, ch: "CycleV", diff: "hard", domain: "Modèles", q: "Le modèle en V est principalement utilisé dans quels secteurs industriels ?", opts: ["Startups et projets web agiles", "Secteurs réglementés : automobile (ISO 26262), aéronautique, défense, médical — où la traçabilité des tests est obligatoire", "Projets open source", "Commerce électronique"], ans: 1, expl: "Le Cycle en V est standard dans l'automobile (ISO 26262 pour systèmes embarqués sécurité), l'aéronautique (DO-178C), et le médical (IEC 62304) où la traçabilité vérification ↔ besoins est réglementaire.", trap: "" },
      { id: 137, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le 'Nexus Framework' (Scrum@Scale) est utilisé quand :", opts: ["Une équipe Scrum dépasse 9 membres", "Plusieurs équipes Scrum travaillent sur un même Product Backlog", "Le projet dure plus de 6 mois", "L'organisation n'a pas de SM"], ans: 1, expl: "Nexus = framework de Scrum of Scrums officiel (Ken Schwaber) pour 3 à 9 équipes Scrum travaillant sur un seul Product Backlog et livrant un incrément intégré chaque sprint.", trap: "" },
      { id: 138, ch: "BMM", diff: "hard", domain: "Stratégie", q: "Dans une organisation qui adopte le BMM, quelle est la séquence logique de définition ?", opts: ["Règles → Politiques → Stratégie → Vision", "Vision → Mission → Objectifs → Stratégie → Tactique → Politiques → Règles", "Budget → Stratégie → Vision → Objectifs", "Processus → Règles → Vision"], ans: 1, expl: "Séquence BMM : (1) Vision (état futur désiré), (2) Mission (activité actuelle), (3) Objectifs, (4) Stratégie (LT), (5) Tactique (CT), (6) Politiques (directives), (7) Règles (contraintes précises).", trap: "" },
      { id: 139, ch: "Ishikawa", diff: "hard", domain: "Stratégie", q: "Pour un projet IoT avec le problème 'Latence élevée des capteurs', quelle cause appartient à 'Machines' ?", opts: ["Développeurs non formés aux protocoles IoT", "Protocole MQTT mal configuré", "Capteurs avec processeurs insuffisants et bande passante réseau saturée", "Absence de cahier des charges IoT"], ans: 2, expl: "'Machines' = hardware et infrastructure : capteurs avec CPU insuffisant, réseau saturé. Les protocoles = Méthodes. La formation = Main d'œuvre. Le cahier des charges = Management.", trap: "" },
      { id: 140, ch: "Scrum", diff: "hard", domain: "Scrum", q: "L'organisation impose au PO de prioriser selon la roadmap du management, ignorant les feedbacks clients. En tant que SM, que faites-vous ?", opts: ["Accepter — le management décide", "Ignorer la roadmap", "Aider le PO à trouver un équilibre entre la roadmap stratégique et les feedbacks clients, et faciliter une conversation entre PO et management sur la valeur client", "Escalader directement"], ans: 2, expl: "Le SM aide l'organisation à trouver l'équilibre. La roadmap stratégique ET les feedbacks clients sont tous deux importants. Il facilite la conversation pour que les décisions soient informées et transparentes.", trap: "" },
      { id: 141, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le Sprint Planning Part 2 (2ème partie) se concentre sur :", opts: ["La sélection des US du Product Backlog", "Comment l'équipe va réaliser le travail : décomposition des US en tâches techniques", "La validation des US par le PO", "La définition du Sprint Goal"], ans: 1, expl: "Sprint Planning en 2 parties : Part 1 = Quoi ? (sélection des US, définition du Sprint Goal). Part 2 = Comment ? (décomposition des US en tâches techniques par l'équipe Dev).", trap: "" },
      { id: 142, ch: "Agile", diff: "hard", domain: "Modèles", q: "Le concept de 'Runway' en SAFe (Scaled Agile Framework) représente :", opts: ["La vitesse de livraison", "La quantité de travail refiné et prêt disponible pour les équipes dans le futur (en sprints)", "Le budget restant", "La roadmap annuelle"], ans: 1, expl: "Runway = stock de travail affiné et prêt (Product Backlog refiné) disponible pour les équipes. Un runway de 2-3 sprints est recommandé pour éviter que les équipes manquent de travail.", trap: "" },
      { id: 143, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Lors d'un Sprint, l'équipe découvre qu'une US est beaucoup plus complexe que prévu — le vrai effort est 5× l'estimation. Quelle est la meilleure approche ?", opts: ["Continuer coûte que coûte", "Livrer seulement la partie complétée en fin de sprint et reporter le reste — sans exception à la DoD", "Travailler le week-end pour tout finir", "Ignorer la complexité et marquer Done"], ans: 1, expl: "En Scrum, on ne baisse pas la barre de la DoD pour tenir un délai. La partie non terminée retourne au Product Backlog. Mieux vaut livrer moins de qualité maximale que tout sans qualité.", trap: "Piège : accepter une US partiellement faite violerait la DoD et crée de la dette technique." },
      { id: 144, ch: "Scrum", diff: "med", domain: "Scrum", q: "La céremonie de 'Sprint Review' dure au maximum :", opts: ["2 heures pour un sprint de 2 semaines", "4 heures pour un sprint de 1 mois", "8 heures pour un sprint de 1 mois", "30 minutes"], ans: 1, expl: "Sprint Review timebox : 4 heures maximum pour un sprint d'1 mois. Pour 2 semaines → 2h max. Pour 1 semaine → 1h max. Proportionnelle à la durée du sprint.", trap: "" },
      { id: 145, ch: "Agile", diff: "hard", domain: "Modèles", q: "L'approche 'Outside-In' (Outside-In Development) en Agile signifie :", opts: ["Développer de l'extérieur vers l'intérieur de l'architecture", "Commencer par les tests d'acceptation (vue utilisateur) pour guider le développement de l'intérieur", "Impliquer les stakeholders externes", "Déployer en environnement externe d'abord"], ans: 1, expl: "Outside-In = développer guidé par les tests d'acceptation (comportement attendu par l'utilisateur) qui définissent ce qu'on doit construire, puis implémenter de l'extérieur vers l'intérieur de l'archi.", trap: "" },
      { id: 146, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le PO veut être présent à TOUTES les réunions quotidiennes (Daily Scrum) pour 'rester informé'. Que lui dit le SM ?", opts: ["Excellente idée pour la transparence", "Le PO peut assister mais sans droit à la parole — le Daily est pour l'équipe Dev seulement", "Le PO doit assister pour valider l'avancement", "Proposer de créer un rapport quotidien à la place"], ans: 1, expl: "Le PO PEUT assister au Daily Scrum mais ne participe pas activement. Si sa présence crée une pression sur l'équipe, le SM peut le lui signaler. Mieux : le PO reste disponible pour clarifications post-Daily.", trap: "" },
      { id: 147, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Quelle est la PRINCIPALE valeur Scrum mise en jeu quand l'équipe ne signale pas un blocage par peur de décevoir le SM ?", opts: ["Courage", "Focalisation", "Transparence — et indirectement le Respect et l'Ouverture", "Engagement"], ans: 2, expl: "Les 5 valeurs Scrum : Courage, Focalisation, Engagement, Respect, Ouverture. Ne pas signaler un blocage par peur viole la Transparence (pilier Scrum), l'Ouverture (partager les difficultés) et le Courage.", trap: "" },
      { id: 148, ch: "Agile", diff: "hard", domain: "Modèles", q: "La méthode DSDM (Dynamic Systems Development Method) diffère de Scrum principalement par :", opts: ["Elle n'a pas de rôles définis", "Elle fixe le calendrier et le budget, et ajuste les fonctionnalités (MoSCoW) — l'inverse du Waterfall qui fixe tout", "Elle ne produit pas d'incrément", "Elle est réservée aux grandes entreprises"], ans: 1, expl: "DSDM = 'time-boxed, fixed budget, variable scope'. On fixe temps et coût, puis on priorise avec MoSCoW (Must/Should/Could/Won't) pour livrer le maximum de valeur dans les contraintes.", trap: "" },
      { id: 149, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Un team member Scrum déclare : 'Je ne suis pas dev, je suis Architecte senior — je ne fais pas de tests.' Quelle est la réponse Scrum ?", opts: ["Correct — les architectes ne testent pas", "Acceptable en début de projet", "En Scrum, l'équipe Dev est cross-fonctionnelle et collectivement responsable. Il n'y a pas de silos de rôles — chacun contribue selon les besoins du sprint", "Le SM le remplace"], ans: 2, expl: "L'équipe Dev Scrum est cross-fonctionnelle et sans silos internes. Bien que les expertises individuelles existent, toute l'équipe est collectivement responsable de livrer un incrément de qualité — y compris les tests.", trap: "Piège : le titre 'Architecte' ou 'Lead Dev' n'existe pas dans Scrum — tout le monde est 'Developer'." },
      { id: 150, ch: "Scrum", diff: "hard", domain: "Scrum", q: "QUESTION FINALE — Synthèse PMP/Scrum : Un projet critique a des besoins initiaux clairs (architecture défense) mais avec une composante IA dont les données sont incertaines. Quelle approche hybride recommandez-vous ?", opts: ["100% Waterfall pour tout le projet", "100% Scrum pour tout le projet", "Approche hybride : Waterfall pour les composantes à exigences stables (architecture défense), Scrum pour la composante IA — avec points de synchronisation", "Spiral seul"], ans: 2, expl: "L'hybride est la réponse de maturité PMP : on choisit l'approche selon la nature du composant. Stable → prédictif (Waterfall). Incertain → adaptatif (Scrum). Les points de synchronisation assurent la cohérence.", trap: "Piège : l'examen PMP valorise la pensée hybride et contextuelle plutôt que le dogmatisme d'un seul modèle." },
      /* ===== PMP SITUATIONAL — PEOPLE DOMAIN ===== */
      { id: 151, ch: "Scrum", diff: "hard", domain: "People", q: "[PMP-PEOPLE] Le PO refuse systématiquement de prioriser le backlog par valeur business, préférant ses intuitions. En tant que SM, que faites-vous ?", opts: ["Modifier le backlog à sa place", "Signaler au management", "Organiser une session de facilitation avec le PO pour explorer la valeur business et les dépendances techniques", "Laisser faire pour respecter l'autonomie du PO"], ans: 2, expl: "Le SM est facilitateur et coach — il ne remplace pas le PO. Il organise un atelier structuré pour que le PO comprenne les outils de priorisation par valeur (WSJF, MoSCoW). Respecter l'autonomie en adressant le problème via la collaboration.", trap: "Piège : 'Laisser faire' = passivité. 'Signaler au management' = contourner — deux options anti-Scrum." },
      { id: 152, ch: "Scrum", diff: "hard", domain: "People", q: "[PMP-PEOPLE] En rétrospective, un développeur senior domine toutes les discussions. Les autres membres restent silencieux. Que doit faire le SM ?", opts: ["Demander au senior de se taire", "Annuler la rétro", "Utiliser des techniques structurées : 'talking token', post-its anonymes, vote silencieux pour équilibrer la participation", "Raccourcir la durée des rétros"], ans: 2, expl: "La facilitation agile privilégie les techniques structurelles qui modifient les dynamiques de groupe sans confrontation directe. Les post-its anonymes et le vote silencieux créent un espace psychologiquement sûr pour tous.", trap: "Piège : confronter directement le senior crée des tensions. La solution systémique (technique de facilitation) est toujours préférée au PMP." },
      { id: 153, ch: "Scrum", diff: "hard", domain: "People", q: "[PMP-PEOPLE] L'équipe est distribuée sur 3 fuseaux horaires (Paris, Montréal, Bangalore). Les daily scrums de 15 min sont inefficaces. Quelle est la meilleure solution ?", opts: ["Annuler les daily scrums", "Imposer un seul fuseau horaire", "Mettre en place un modèle 'follow-the-sun' avec documentation asynchrone et un représentant par zone", "Réduire la taille de l'équipe"], ans: 2, expl: "Le modèle 'follow-the-sun' répartit le travail selon les fuseaux. Documentation asynchrone (Confluence, Slack) + Scrum of Scrums regionaux. Les daily peuvent être partiellement asynchrones avec des outils comme StatusHero.", trap: "Piège : Scrum recommande l'équipe co-localisée, mais en réalité la documentation asynchrone + représentants régionaux est la réponse PMP pragmatique." },
      { id: 154, ch: "Scrum", diff: "hard", domain: "People", q: "[PMP-PEOPLE] Le PO exige que l'équipe livre 150% de sa vélocité moyenne pour ce sprint. Il invoque la pression du client. Que fait le SM ?", opts: ["Accepter pour satisfaire le client", "Promettre de faire le maximum", "Rappeler que l'équipe de développement est seule responsable de ses engagements et faciliter une discussion sur la capacité réaliste", "Réduire la qualité pour tenir le délai"], ans: 2, expl: "Le SM protège l'équipe des pressions extérieures. La vélocité est une mesure historique, pas une cible imposable. Seule l'équipe peut s'engager. Faciliter une conversation transparente PO ↔ Équipe est la bonne approche.", trap: "Piège : accepter = sur-engagement = dette technique = vélocité future dégradée. Le PMP valorise l'honnêteté et la transparence." },
      { id: 155, ch: "Scrum", diff: "hard", domain: "People", q: "[PMP-PEOPLE] L'équipe Scrum compte 11 développeurs. Les daily standups durent 45 minutes et l'équipe peine à s'aligner. Quelle est la solution Scrum ?", opts: ["Raccourcir le daily à 5 minutes", "Nommer un 'facilitateur daily'", "Réduire l'équipe à max 9 personnes et créer un second Scrum Team avec Scrum of Scrums", "Éliminer le daily"], ans: 2, expl: "Scrum recommande 3-9 développeurs pour une communication efficace. À 11, les problèmes d'alignement sont structurels. La solution est de créer 2 équipes (5+6 ou 6+5) avec un Scrum of Scrums pour la coordination inter-équipes.", trap: "Piège : 'Raccourcir le daily' ne résout pas le problème de coordination. La taille est la cause racine." },
      { id: 156, ch: "Agile", diff: "hard", domain: "Process", q: "[PMP-PROCESS] La Definition of Done est définie mais n'est jamais vérifiée en fin de sprint. Que doit faire le SM ?", opts: ["Supprimer la DoD", "La définir différemment", "Rendre la DoD visible (checklist physique ou outil), l'intégrer aux critères d'acceptation, et vérifier son application en rétrospective", "Demander au PO de la vérifier"], ans: 2, expl: "La DoD doit être vivante, visible et vérifiable. Une checklist affichée physiquement ou dans Jira/Azure DevOps + intégration dans la review rend la DoD incontournable. La rétro analyse les écarts.", trap: "Piège : une DoD qui existe mais n'est pas appliquée est pire qu'une DoD inexistante — elle crée une fausse confiance." },
      { id: 157, ch: "Scrum", diff: "hard", domain: "Process", q: "[PMP-PROCESS] Les estimations varient de 200% entre sprints pour des stories similaires. Le planning poker donne des résultats incohérents. Comment résoudre ?", opts: ["Passer aux estimations en heures", "Éliminer les estimations", "Introduire des 'reference stories' (étalon de calibrage), pratiquer la triangulation et revoir les estimations en rétro", "Laisser le SM estimer"], ans: 2, expl: "L'incohérence révèle un manque de référentiel commun. Les 'reference stories' (ex: 'une story à 3 SP c'est comme migrer un champ de base de données') calibrent l'équipe. La triangulation compare les nouvelles stories aux étalons.", trap: "Piège : les heures semblent plus précises mais créent de la microgestion et masquent l'incertitude réelle." },
      { id: 158, ch: "Agile", diff: "hard", domain: "Process", q: "[PMP-PROCESS] La vélocité est stable à 40 SP/sprint, mais la valeur livrée client est perçue comme faible. Le PO se plaint. Qu'est-ce que cela révèle ?", opts: ["L'équipe est trop lente", "La vélocité mesure l'activité, pas la valeur — problème de priorisation ou de product discovery", "Le SM ne facilite pas bien", "Les story points sont mal estimés"], ans: 1, expl: "La vélocité mesure le travail accompli, pas la valeur livrée. Si le client perçoit peu de valeur, le problème est en amont : priorisation du backlog incorrecte, manque de product discovery, stories sans valeur business réelle.", trap: "Piège : augmenter la vélocité ne résoudrait pas le problème. Le vrai KPI est la valeur business livrée (NPS, usage, revenus)." },
      { id: 159, ch: "Scrum", diff: "hard", domain: "Process", q: "[PMP-PROCESS] La Sprint Review ressemble à une démonstration technique incompréhensible pour les stakeholders. Que doit faire le SM ?", opts: ["Inviter moins de stakeholders", "Coacher PO et équipe à préparer des démonstrations orientées valeur business avec scénarios utilisateur", "Raccourcir la review", "Lire le Sprint Backlog à la place"], ans: 1, expl: "La Sprint Review inspecte l'incrément par rapport au Sprint Goal et à la valeur business. Elle doit parler le langage des stakeholders. Le SM coache l'équipe à présenter via des scénarios utilisateur concrets, pas des screenshots techniques.", trap: "Piège : le SM ne prépare pas les démos lui-même — il coache. La review est une responsabilité collective." },
      { id: 160, ch: "Agile", diff: "hard", domain: "Process", q: "[PMP-PROCESS] Le PO refuse d'allouer du temps au remboursement de la dette technique, arguant que 'ça n'a pas de valeur visible'. Que lui explique le SM ?", opts: ["Accepter la décision du PO", "La dette technique est un risque légal", "La dette technique s'accumule comme des intérêts composés, ralentit la vélocité future et augmente les bugs — allouer 20% de chaque sprint est une pratique recommandée", "Refactoriser en secret"], ans: 2, expl: "Métaphore financière : la dette technique = emprunt. Chaque sprint sans remboursement ajoute des 'intérêts' (bugs, lenteur, complexité). La règle des 20% par sprint est un équilibre pragmatique entre livraison de valeur et qualité.", trap: "Piège : 'Refactoriser en secret' = manque de transparence, anti-Scrum. 'Accepter' = vélocité future dégradée garantie." },
      { id: 161, ch: "Scrum", diff: "hard", domain: "BizEnv", q: "[PMP-BIZENV] Un sponsor veut mesurer le ROI de la transformation agile. Il demande des métriques. Quels KPIs proposez-vous ?", opts: ["Vélocité et story points", "Nombre de réunions réduites", "KPIs business : time-to-market, satisfaction client (NPS), taux de bugs en production, ROI fonctionnel par feature", "Nombre de sprints complétés"], ans: 2, expl: "La valeur agile se mesure par l'impact business, pas l'activité technique. KPIs pertinents : Time-to-market (vitesse de livraison), NPS (satisfaction), taux de bugs (qualité), ROI par feature (priorisation). Les SP sont des métriques internes, pas business.", trap: "Piège : présenter la vélocité à un sponsor = parler en langage technique à quelqu'un qui pense en termes d'euros et de délais." },
      { id: 162, ch: "Scrum", diff: "hard", domain: "BizEnv", q: "[PMP-BIZENV] Des stakeholders avec des besoins contradictoires bloquent la priorisation du backlog. Le PO est paralysé. Que recommandez-vous ?", opts: ["Le PO décide seul", "Le SM tranche", "Organiser un atelier de priorisation par valeur avec toutes les parties (Impact Mapping, MoSCoW, WSJF)", "Attendre que les stakeholders s'accordent"], ans: 2, expl: "L'Impact Mapping (pourquoi-qui-comment-quoi) et MoSCoW permettent aux stakeholders de visualiser les dépendances et trade-offs. WSJF (Weighted Shortest Job First) formalise la priorisation. Le SM facilite, le PO décide.", trap: "Piège : 'le SM tranche' = sortir de son rôle. 'Attendre' = passivité. La facilitation structurée est la réponse PMP." },
      { id: 163, ch: "Modèles", diff: "hard", domain: "Modèles", q: "[CAS ZENITH] Le projet Zenith Healthcare a des besoins stables, 4 composants indépendants, une équipe distribuée. Quel modèle recommandez-vous ?", opts: ["Scrum pur", "Waterfall pur", "Incrémental (avec Cycle en V pour le composant critique)", "Spirale"], ans: 2, expl: "Besoins stables → pas besoin d'Agile. 4 composants indépendants → livraison incrémentale par composant. Un composant critique nécessite validation formelle → Cycle en V. C'est la combinaison Incrémental + Cycle en V. PMP appelle ça 'approche hybride prédictive'.", trap: "Piège : 'Scrum' semble moderne mais est inadapté aux besoins stables et aux contraintes de compliance d'un environnement médical." },
      { id: 164, ch: "Modèles", diff: "hard", domain: "Modèles", q: "[CAS GEORGIA] Georgia School of Arts : besoins non définis, automatisation sur 5 ans, livraison progressive, retours utilisateurs essentiels. Quel modèle ?", opts: ["Waterfall", "Cycle en V", "Agile/Incrémental (value-driven, time-boxé, feedback continu)", "Spirale uniquement"], ans: 2, expl: "Besoins flous → Agile. Livraison par lots → Incrémental. Feedback utilisateurs → revues régulières. Budget/délai fixe, scope flexible → approche Agile pure. Ce cas illustre exactement pourquoi Agile existe : incertitude + valeur progressive.", trap: "Piège : 'Spirale' gère les risques techniques mais pas la valorisation continue par l'utilisateur comme le fait Agile." },
      { id: 165, ch: "Scrum", diff: "hard", domain: "BizEnv", q: "[PMP-BIZENV] Le secteur est bancaire avec des exigences de compliance réglementaires strictes. L'équipe agile veut 'aller vite'. Comment concilier ?", opts: ["Abandonner Agile", "Ignorer la compliance jusqu'à l'audit", "Intégrer les exigences réglementaires dans les critères d'acceptation, la DoD et le backlog dès le sprint 0", "Faire un sprint 'compliance' tous les 6 mois"], ans: 2, expl: "La compliance n'est pas optionnelle — c'est une contrainte non-négociable. L'approche PMP : intégrer la compliance dans la DoD (ex: 'chaque story doit passer l'audit de conformité RGPD') et dans les critères d'acceptation dès le départ.", trap: "Piège : un sprint 'compliance' à la fin = approche Waterfall déguisée. La compliance continue intégrée est la méthode agile." },
      { id: 166, ch: "Agile", diff: "hard", domain: "Process", q: "[PMP-KANBAN] L'équipe Kanban ne respecte pas les WIP limits. Les colonnes débordent et le flux est bloqué. Que faire en premier ?", opts: ["Augmenter les WIP limits", "Supprimer les WIP limits", "Rendre les WIP limits bloquants physiquement/outil, et analyser les causes du blocage en rétrospective", "Ajouter des ressources"], ans: 2, expl: "Les WIP limits sont le cœur de Kanban. S'ils ne sont pas respectés, le problème est qu'ils ne sont pas 'bloquants' en pratique. Solution : les rendre physiquement visibles et bloquants dans l'outil (Jira/Trello). La rétro identifie pourquoi le flux se bloque.", trap: "Piège : augmenter les WIP limits = détruire le principe Kanban. Scrum/Kanban = règles non-négociables une fois définies." },
      {
        id: 167, ch: "Agile", diff: "hard", domain: "People", q: "[PMP-PEOPLE] Un développeur spécialisé en sécurité se sent 'inutile' car les stories techniques ne lui sont pas assignées chaque sprint. Que faire ?", opts: ["L'affecter à un autre projet", "Créer des stories de sécurité à chaque sprint", "Encourager l'équipe à intégrer la sécurité dès la DoD et les critères d'acceptation, et développer les T-shaped skills", "Ignorer — chaque dev a sa spécialité"], ans: 2, expl: "Scrum/Agile favorise les T-shaped skills : expertise approfondie dans un domaine principal et compétences généralistes dans d'autres domaines pour collaborer efficacement et aider l'équipe." }
    ];

const FC = [
          { id: 1, ch: "Modèles", front: "Waterfall — Avantages vs Inconvénients", back: "✅ Structure claire, bonne documentation, coûts estimables, phases délimitées\n❌ Effet tunnel, erreurs détectées tard, besoins figés, pas de retour en arrière" },
          { id: 2, ch: "Modèles", front: "Cycle en V — 4 Symétries fondamentales", back: "Besoins ↔ Tests de Recette (validation client)\nArchitecture ↔ Tests Système\nConception Générale ↔ Tests Intégration\nConception Détaillée ↔ Tests Unitaires" },
          { id: 3, ch: "Modèles", front: "Spirale — 4 Quadrants (Boehm)", back: "1. Identification des objectifs & contraintes\n2. Analyse des risques + Prototype\n3. Développement & vérification\n4. Planification du cycle suivant\n→ Dédié aux projets COMPLEXES avec risques" },
          { id: 4, ch: "Modèles", front: "Itératif vs Incrémental", back: "🔄 Itératif : répète le MÊME processus, le but évolue\n📦 Incrémental : ajoute NOUVELLES fonctionnalités\n⚠️ Incrémental = vision du Produit Final DÈS LE DÉBUT" },
          { id: 5, ch: "Stratégie", front: "BMM — Structure ENDS & MEANS", back: "ENDS (Fins) :\n👁️ Vision → état futur idéal\n📌 Mission → activité actuelle\n🎯 Objectifs → résultats à atteindre\n\nMEANS (Moyens) :\n🔵 Stratégie (Long Terme)\n⚡ Tactique (Court Terme)\n📜 Politiques → directives générales\n📏 Règles → contraintes précises" },
          { id: 6, ch: "Stratégie", front: "BMM — Vision vs Mission vs Stratégie vs Tactique", back: "👁️ Vision = VOULOIR ÊTRE (état futur idéal)\n📌 Mission = CE QU'ON FAIT aujourd'hui\n🔵 Stratégie = Long Terme (pluriannuel)\n⚡ Tactique = Court Terme (trimestriel)\n\nSéquence : Vision→Mission→Obj→Strat→Tact→Pol→Règles" },
          { id: 7, ch: "Stratégie", front: "BMM — Politique vs Règle", back: "📜 Politique = Directive GÉNÉRALE (oriente, ne prescrit pas)\nEx: 'Assurer confidentialité des données'\n\n📏 Règle = Contrainte PRÉCISE actionnable\nEx: 'Chiffrer données AES-256'\n\nRègles découlent des Politiques" },
          { id: 8, ch: "Stratégie", front: "Ishikawa — 6M (projet logiciel IA)", back: "👥 Main d'œuvre : équipe, compétences, formation\n📦 Matières : données, informations (fausses/inaccessibles)\n⚙️ Méthodes : algorithmes, ETL, processus\n🖥️ Machines : hardware, cloud, GPU, capteurs\n🌍 Milieu : culture, RGPD, organisation\n📊 Management : planning, gouvernance, communication" },
          { id: 9, ch: "Stratégie", front: "Ishikawa — Règle d'or absolue", back: "⚠️ 1 SEUL effet (problème) par diagramme\n→ Règle d'or absolue\n\n3 étapes :\n1. Identifier l'EFFET (problème)\n2. Identifier les CATÉGORIES (6M)\n3. Identifier les CAUSES dans chaque catégorie\n\n🔍 Technique complémentaire : 5 Pourquoi" },
          { id: 10, ch: "Scrum", front: "Scrum — 3 Rôles officiels", back: "👤 Product Owner : valeur produit, SEUL resp. du Product Backlog\n🛡️ Scrum Master : servant leader, facilite, protège, coache\n💻 Équipe Dev : 3-9 membres, cross-fonctionnelle, auto-organisée" },
          { id: 11, ch: "Scrum", front: "Scrum — 3 Artifacts + engagements", back: "📋 Product Backlog → Product Goal (resp. PO)\n📝 Sprint Backlog → Sprint Goal (resp. équipe)\n✅ Incrément → Definition of Done\n\nChaque artifact a un engagement transparent" },
          { id: 12, ch: "Scrum", front: "Scrum — 4 Cérémonies (time-boxes)", back: "📅 Sprint Planning : 8h max (sprint 1 mois)\n☀️ Daily Scrum : 15 min max\n🎯 Sprint Review : 4h max (sprint 1 mois)\n🔄 Rétrospective : 3h max (sprint 1 mois)\n\n⚡ Refinement = activité continue ≠ cérémonie officielle" },
          { id: 13, ch: "Scrum", front: "Sprint Planning — 3 Outputs + 2 parties", back: "Outputs : Sprint Goal + Sprint Backlog + DoD\n\nPart 1 (QUOI) : sélection des US, définition du Sprint Goal\nPart 2 (COMMENT) : décomposition en tâches techniques\n\n⏱️ 8h max pour sprint d'1 mois" },
          { id: 14, ch: "Scrum", front: "Definition of Done (DoD) — Checklist complète", back: "✅ Code écrit et revu (peer review)\n✅ Tests unitaires, intégration, régression passés\n✅ Documentation technique + utilisateur à jour\n✅ Performance vérifiée\n✅ Securité vérifiée\n✅ Accessibilité respectée\n✅ Déployable en production" },
          { id: 15, ch: "Scrum", front: "Scrum Master — Servant Leader", back: "✅ Élimine les obstacles (Impediment Backlog)\n✅ Protège l'équipe des perturbations externes\n✅ Coache l'équipe + l'organisation sur l'Agile\n\n❌ JAMAIS chef de projet avec autorité\n❌ JAMAIS décisions techniques\n❌ JAMAIS remplacer le PO" },
          { id: 16, ch: "Scrum", front: "Qui peut annuler un sprint ?", back: "🔑 SEUL le Product Owner peut annuler un sprint\n→ Uniquement si le Sprint Goal est devenu obsolète\n→ En concertation avec les stakeholders\n→ Décision rare et coûteuse\n\n❌ Ni le SM, ni l'équipe Dev" },
          { id: 17, ch: "Scrum", front: "Sprint Review vs Rétrospective", back: "🎯 Sprint REVIEW = PRODUIT\n→ Incrément + stakeholders + PO + SM + Dev\n→ 4h max/mois\n→ Adapte le Product Backlog\n\n🔄 Sprint RÉTROSPECTIVE = PROCESSUS\n→ PAS de stakeholders\n→ 3h max/mois\n→ 1-2 actions concrètes d'amélioration" },
          { id: 18, ch: "Scrum", front: "5 Valeurs + 3 Piliers Scrum", back: "Valeurs : Courage / Focalisation / Engagement / Respect / Ouverture\n\nPiliers (TIA) :\n🔍 Transparence\n🔎 Inspection\n🔄 Adaptation\n\n→ Sans les valeurs → les piliers échouent" },
          { id: 19, ch: "Scrum", front: "Vélocité + Burn-down Chart", back: "📊 Vélocité = moyenne SP livrés (DoD) sur 3 derniers sprints\n→ Outil PLANIFICATION uniquement\n❌ Jamais = performance individuelle\n\n📉 Burn-down = travail RESTANT vs temps\n📈 Burn-up = travail COMPLÉTÉ vs temps\n⛰️ Remontée de la courbe = Scope Creep" },
          { id: 20, ch: "Scrum", front: "Backlog Produit vs Backlog Sprint", back: "📋 PRODUIT : Portée globale, resp. PO, estimé en SP (gros grain), priorisé par valeur, évolue toujours\n\n📝 SPRINT : Portée 1 sprint, resp. équipe Dev, estimé en heures/jours, figé pendant le sprint" },
          { id: 21, ch: "Agile", front: "Manifeste Agile — 4 Valeurs", back: "1. Individus > Processus et outils\n2. Logiciel fonctionnel > Documentation\n3. Collaboration client > Contrat\n4. Adaptation > Plan initial\n\n→ 17 signataires, Snowbird Utah, 2001" },
          { id: 22, ch: "Agile", front: "12 Principes Agile — Les Essentiels", back: "1. Satisfaction client priorité #1\n2. Accueillir les changements\n3. Livraisons fréquentes\n4. Business & Dev ensemble quotidiennement\n5. Équipes motivées\n6. Conversation face-à-face\n7. Logiciel opérationnel = mesure d'avancement\n8. Rythme soutenable (pas de burnout)\n9. Excellence technique\n10. Simplicité (maximiser NON-fait)\n11. Équipes auto-organisées\n12. Rétrospective régulière" },
          { id: 23, ch: "Agile", front: "Anti-patterns Scrum à connaître", back: "❌ SM assigne les tâches → Équipe s'auto-organise\n❌ PO absent → Escalader, ne pas donner au SM\n❌ Sprint Goal = 'Finir toutes les stories' → Orienté Valeur\n❌ Daily = reporting au SM → Synchro Dev ↔ Dev\n❌ Vélocité = KPI individuel → Métrique d'équipe\n❌ Rétro sans action → Improvement Backlog" },
          { id: 24, ch: "Stratégie", front: "Mots-clés PMP GAGNANTS ✅", back: "✅ Faciliter → SM collabore\n✅ Coacher / Éduquer → SM enseigne l'Agile\n✅ Time-boxed / Spike → lever incertitude technique\n✅ Empirisme → décider via les données\n✅ Safe space → sécurité psychologique (rétro)\n✅ Auto-organisation → équipe choisit" },
          { id: 25, ch: "Stratégie", front: "Mots-clés PMP À ÉLIMINER ❌", back: "❌ Imposer, forcer, dicter\n❌ Trancher à la place du PO ou Dev\n❌ Ignorer (le risque, le conflit)\n❌ Demander au management de résoudre sans essayer\n❌ Punir / Blâmer\n❌ Décider seul sans consultation\n→ Ces réponses sont TOUJOURS fausses en PMP" },
          { id: 26, ch: "Modèles", front: "Cas Zenith Healthcare → Modèle recommandé", back: "🏥 Situation : exigences stables, 4 composants indépendants, équipe distribuée\n\n💡 Solution : Incrémental (composants indépendants) + Cycle en V (composant médical critique)\n\nPourquoi ? Besoins stables → pas Scrum. Médical critique → traçabilité V obligatoire." },
          { id: 27, ch: "Modèles", front: "Cas Georgia School of Arts → Modèle recommandé", back: "🎨 Situation : exigences floues, livraison progressive 5 ans, feedback utilisateurs essentiels\n\n💡 Solution : Agile / Incrémental (value-driven)\n\nPourquoi ? Flou + feedback = empirisme Agile. Budget fixe + scope flexible = Agile (MoSCoW/DSDM)." },
          { id: 28, ch: "Agile", front: "T-shaped skills", back: "T = Profil Agile idéal\n\n— (horizontal) : compétences de base en dev, test, design\n— | (vertical) : expertise profonde dans 1 domaine\n\nPourquoi ? Évite les goulots d'étranglement, favorise l'entraide, essentiel pour équipes cross-fonctionnelles" },
          { id: 29, ch: "Agile", front: "INVEST — Critères d'une bonne User Story", back: "I = Independent (indépendante)\nN = Negotiable (négociable)\nV = Valuable (valeur pour l'utilisateur)\nE = Estimable (estimable)\nS = Small (petite, faisable en 1 sprint)\nT = Testable (avec critères d'acceptation)\n\n→ Story trop grande = EPIC → décomposer" },
          { id: 30, ch: "Agile", front: "Scrum vs Kanban vs XP", back: "⚡ Scrum : sprints + 3 rôles + 4 cérémonies + 3 artifacts\n📋 Kanban : flux continu + WIP limits, SANS sprints ni rôles\n💻 XP : TDD + Pair programming + Refactoring + CI\n\nScrumban = Scrum + Kanban combinés\nAgile ⊃ tous ces frameworks" },
          { id: 31, ch: "Agile", front: "Cynefin — Scrum dans quel domaine ?", back: "🟡 Complexe = émergent → SCRUM ✅\n🔵 Compliqué = expertise → Waterfall/méthodes\n🟢 Simple = best practices\n🔴 Chaotique = agir d'abord" },
          { id: 32, ch: "Agile", front: "TDD vs BDD", back: "TDD: Red-Green-Refactor\n→ Tests unitaires, code d'abord\nBDD: Given-When-Then (Gherkin)\n→ Comportement utilisateur, compréhensible par tous\nBDD ⊃ TDD" },
          { id: 33, ch: "Agile", front: "MVP vs Prototype (Spirale)", back: "📦 MVP = livrable RÉEL pour vrais utilisateurs\n→ Valide hypothèse business\n🔬 Prototype = exploratoire, peut être jeté\n→ Valide hypothèse technique\nMVP ≠ Prototype" },
          { id: 34, ch: "Agile", front: "Sécurité Psychologique", back: "🧠 Amy Edmondson:\nPrendre des risques interpersonnels sans crainte\n→ Parler, questionner, échouer librement\n→ Condition vraie Rétro\n→ Google Aristotle: 1er facteur équipe performante" },
          { id: 35, ch: "Agile", front: "Dette Technique", back: "💳 Coût FUTUR des raccourcis pris aujourd'hui\n→ Code non testé / non refactorisé\n→ S'accumule et ralentit la vélocité\n→ Gérer dans le Product Backlog\n→ Intentionnelle OU non-intentionnelle" },
          { id: 36, ch: "Agile", front: "SAFe vs LeSS vs Nexus", back: "🏢 SAFe: enterprise, Agile Release Trains\n🌍 LeSS: Large-Scale Scrum, simple, Craig Larman\n🏗️ Nexus: 3-9 équipes, 1 Backlog, Ken Schwaber" },
          { id: 37, ch: "Scrum", front: "Planning Poker — Fibonacci", back: "Suite: 1,2,3,5,8,13,21...\n→ Incertitude croissante avec la taille\n→ Divergence: le + haut ET + bas expliquent\n→ Discussion → revote\n❌ Pas de moyenne / majorité imposée" },
          { id: 38, ch: "Scrum", front: "Burndown Chart — Analyse", back: "📉 Sous la ligne idéale = En avance sur le planning\n📈 Au-dessus = En retard (attention!)\n➡️ Ligne plate = Blocage ou tâches non mises à jour\n⛰️ Pic (remontée) = Scope creep (ajout de travail au backlog de sprint)\nIdéalement, finit à 0 à la fin du sprint." },
          { id: 39, ch: "Agile", front: "Modèle 'Follow-the-sun'", back: "🌍 Contexte : Équipes distribuées mondialement.\n💡 Principe : Le travail passe d'une équipe à l'autre selon les fuseaux horaires.\nClé : Documentation asynchrone forte et handovers structurés." },
          { id: 40, ch: "Scrum", front: "DoD vs DoR", back: "DoR (Definition of Ready) : critère pour qu'une story entre en Sprint.\nDoD (Definition of Done) : critère pour qu'une story soit considérée livrée.\nDoR = Pour préparer le sprint (PO resp.), DoD = Fin du sprint (Équipe resp.)." }
        ];

function updateStreak(){
  const today=new Date().toLocaleDateString('en-CA');
  if(!ST.lastActive){ST.streak=1;ST.lastActive=today;ST.save();}
  else if(ST.lastActive!==today){
    const diff=Math.floor((new Date(today)-new Date(ST.lastActive))/86400000);
    if(diff===1)ST.streak++;else if(diff>1)ST.streak=1;
    ST.lastActive=today;ST.save();
  }
  const el=document.getElementById('streak-val');if(el)el.textContent=ST.streak;
}
updateStreak();

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function chTag(ch){const m={Scrum:'tag-scrum',Agile:'tag-agile',Waterfall:'tag-waterfall',CycleV:'tag-waterfall',Spirale:'tag-spiral',BMM:'tag-bmm',Ishikawa:'tag-ishi',Modèles:'tag-agile',Stratégie:'tag-bmm',People:'tag-pmp',Process:'tag-pmp',BizEnv:'tag-pmp'};return `<span class="tag ${m[ch]||'tag-scrum'}">${esc(ch)}</span>`;}
function diffTag(d){const m={easy:'tag-easy',med:'tag-med',hard:'tag-hard'};const l={easy:'Facile',med:'Moyen',hard:'Difficile'};return `<span class="tag ${m[d]}">${l[d]}</span>`;}
function hl(txt){if(!ST.search||!txt)return esc(txt);const re=new RegExp('('+ST.search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return esc(txt).replace(re,'<mark>$1</mark>');}
function toast(msg){const el=document.getElementById('toast');if(!el)return;el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function openModal(title,body){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=body;document.getElementById('modal-ov').classList.add('open');}

function playEntrySound(){
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const now=ctx.currentTime;
    const notes=[523.25, 587.33, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(freq, now + i*0.08);
      gain.gain.setValueAtTime(0.001, now + i*0.08);
      gain.gain.linearRampToValueAtTime(0.15, now + i*0.08 + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.08 + 0.6);
      osc.start(now + i*0.08);
      osc.stop(now + i*0.08 + 0.6);
    });
  } catch(e){}
}

/* ===== QCM RENDER ===== */
function getFilteredQ(){
  let pool=Q;
  if(ST.qcm.chapter!=='all')pool=pool.filter(q=>q.ch===ST.qcm.chapter);
  if(ST.qcm.mode==='wrong')pool=pool.filter(q=>ST.qcm.answers[q.id]===false);
  if(ST.qcm.mode==='bookmarks')pool=pool.filter(q=>ST.qcm.bookmarks[q.id]);
  if(ST.search){const s=ST.search;pool=pool.filter(q=>q.q.toLowerCase().includes(s)||q.opts.some(o=>o.toLowerCase().includes(s)));}
  return pool;
}

function renderQCM(){
  const el=document.getElementById('tab-qcm');if(!el)return;
  const total=Q.length;
  const answered=Object.keys(ST.qcm.answers).filter(k=>!k.includes('_sel')).length;
  const correct=Object.entries(ST.qcm.answers).filter(([k,v])=>!k.includes('_sel')&&v===true).length;
  const wrong=answered-correct;
  const chapters=['all','Scrum','Agile','Modèles','Waterfall','CycleV','Spirale','BMM','Ishikawa','People','Process','BizEnv'];
  const fp=getFilteredQ();
  if(fp.length===0){
    let icon='🔍',title='Aucun résultat',sub='Essayez un autre filtre.';
    if(ST.qcm.mode==='wrong'){icon='🎉';title='Aucune erreur !';sub='Toutes vos réponses sont correctes !';}
    if(ST.qcm.mode==='bookmarks'){icon='🔖';title='Aucun signet';sub='Cliquez sur 🔖 pour sauvegarder une question.';}
    el.innerHTML=`<div class="empty"><span class="empty-icon">${icon}</span><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;return;
  }
  const qi=Math.min(ST.qcm.idx,fp.length-1);
  const q=fp[qi];
  const isAns=ST.qcm.answers.hasOwnProperty(q.id)&&!String(q.id).includes('_sel');
  const isDone=ST.qcm.answers[q.id]!==undefined&&typeof ST.qcm.answers[q.id]==='boolean';
  const isBk=!!ST.qcm.bookmarks[q.id];
  const pct=total>0?Math.round((correct/total)*100):0;
  const navHtml=fp.map((qq,i)=>{
    let cls='qn-btn';if(i===qi)cls+=' cur';
    else if(ST.qcm.answers[qq.id]===true)cls+=' ans';
    else if(ST.qcm.answers[qq.id]===false)cls+=' bad';
    if(ST.qcm.bookmarks[qq.id])cls+=' bk';
    return `<button class="${cls}" onclick="ST.qcm.idx=${i};renderQCM()">${i+1}</button>`;
  }).join('');
  const optsHtml=q.opts.map((o,i)=>{
    let cls='opt-btn';let badge='';
    if(isDone){
      if(i===q.ans){cls+=' revealed';badge=`<span class="opt-badge ok">✓</span>`;}
      else if(ST.qcm.answers[q.id+'_sel']===i){cls+=' wrong';badge=`<span class="opt-badge bad">✗</span>`;}
    }
    return `<button class="${cls}" ${isDone?'disabled':''} onclick="answerQ(${q.id},${i},${q.ans})">${String.fromCharCode(65+i)}. ${hl(o)}${badge}</button>`;
  }).join('');
  el.innerHTML=`
<div class="dash">
  <div class="stat"><div class="v">${total}</div><div class="l">Total</div></div>
  <div class="stat"><div class="v">${answered}</div><div class="l">Répondues</div><div class="prog-wrap"><div class="prog-bar" style="width:${Math.round(answered/total*100)}%"></div></div></div>
  <div class="stat"><div class="v" style="color:var(--ok)">${correct}</div><div class="l">Correctes</div></div>
  <div class="stat"><div class="v" style="color:var(--err)">${wrong}</div><div class="l">Erreurs</div></div>
  <div class="stat"><div class="v">${pct}%</div><div class="l">Score</div><div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${pct>=80?'var(--ok)':pct>=50?'var(--warn)':'var(--err)'}"></div></div></div>
</div>
<div class="filter-bar">
  ${chapters.map(c=>`<button class="f-btn${ST.qcm.chapter===c?' on':''}" onclick="ST.qcm.chapter='${c}';ST.qcm.idx=0;renderQCM()">${c==='all'?'Tous':c}</button>`).join('')}
</div>
<div class="filter-bar">
  <button class="f-btn${ST.qcm.mode==='all'?' on':''}" onclick="ST.qcm.mode='all';ST.qcm.idx=0;renderQCM()">Toutes</button>
  <button class="f-btn${ST.qcm.mode==='wrong'?' on':''}" onclick="ST.qcm.mode='wrong';ST.qcm.idx=0;renderQCM()">❌ Erreurs</button>
  <button class="f-btn${ST.qcm.mode==='bookmarks'?' on':''}" onclick="ST.qcm.mode='bookmarks';ST.qcm.idx=0;renderQCM()">🔖 Signets</button>
  <button class="f-btn" onclick="renderQCM()">🔀 Suivant</button>
  <button class="f-btn" onclick="if(confirm('Réinitialiser ?')){ST.qcm.answers={};ST.save();renderQCM()}">♻️ Reset</button>
</div>
<div class="sec-title">${chTag(q.ch)} ${diffTag(q.diff)} <span class="badge">${qi+1}/${fp.length}</span></div>
<div class="card">
  <p style="font-size:15px;font-weight:600;line-height:1.7;margin-bottom:16px">${hl(q.q)}</p>
  ${optsHtml}
  ${isDone?`<div class="expl show">💡 <strong>Explication :</strong> ${esc(q.expl)}</div>`:''}
