<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processus Dev Logiciel — Révision Interactive</title>
  <meta name="description"
    content="Plateforme de révision complète : Scrum, PMP Agile, Waterfall, Cycle en V, Spirale, BMM, Ishikawa">
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #000000;
      --panel: rgba(28, 28, 32, 0.55);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #5e5ce6;
      --accent2: #bf5af2;
      --accent3: #ff375f;
      --ok: #30d158;
      --warn: #ffd60a;
      --err: #ff453a;
      --txt: #ffffff;
      --txt2: rgba(235, 235, 245, 0.6);
      --glass-blur: blur(24px);
      --font: 'Sora', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
      z-index: 0;
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 15% 50%, rgba(94, 92, 230, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(191, 90, 242, 0.15), transparent 25%), radial-gradient(circle at 50% 80%, rgba(255, 55, 95, 0.1), transparent 25%);
      z-index: -1;
      pointer-events: none;
      animation: bgPulse 15s ease-in-out infinite alternate
    }

    @keyframes bgPulse {
      0% {
        transform: scale(1) translate(0, 0)
      }

      100% {
        transform: scale(1.1) translate(-2%, 2%)
      }
    }

    ::-webkit-scrollbar {
      width: 7px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.09);
      border-radius: 10px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(124, 58, 237, 0.5)
    }

    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px
    }

    #scroll-prog {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      z-index: 9999;
      transition: width .1s;
      pointer-events: none
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(10, 10, 12, 0.6);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1)
    }

    .nav-brand {
      padding: 0 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent2);
      white-space: nowrap;
      border-right: 1px solid var(--border);
      letter-spacing: .5px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .nav-brand span {
      font-size: 18px
    }

    .nav-tabs {
      display: flex;
      flex: 1;
      overflow-x: auto
    }

    .tab-btn {
      padding: 0 14px;
      height: 48px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--txt2);
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      transition: all .2s
    }

    .tab-btn:hover {
      color: var(--txt);
      background: rgba(124, 58, 237, .07)
    }

    .tab-btn.active {
      color: var(--accent2);
      border-bottom-color: var(--accent)
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border-left: 1px solid var(--border);
      height: 48px
    }

    #search-box {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--txt);
      padding: 6px 10px;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 13px;
      width: 150px;
      transition: border .2s
    }

    #search-box:focus {
      outline: none;
      border-color: var(--accent)
    }

    #search-box::placeholder {
      color: var(--txt2)
    }

    #session-clock {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--txt2);
      padding: 3px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      white-space: nowrap
    }

    #session-clock.active {
      color: var(--accent2);
      border-color: rgba(124, 58, 237, .4)
    }

    #streak-counter {
      font-size: 13px;
      font-weight: 700;
      color: var(--warn);
      display: flex;
      align-items: center;
      gap: 3px
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px
    }

    .tab-panel {
      display: none;
      animation: fi .22s ease
    }

    .tab-panel.active {
      display: block
    }

    @keyframes fi {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .dash {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px
    }

    .stat {
      background: var(--panel);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1)
    }

    .stat .v {
      font-size: 26px;
      font-weight: 800;
      color: var(--accent2)
    }

    .stat .l {
      font-size: 11px;
      color: var(--txt2);
      margin-top: 3px
    }

    .prog-wrap {
      background: var(--border);
      border-radius: 4px;
      height: 4px;
      margin-top: 6px;
      overflow: hidden
    }

    .prog-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width .4s
    }

    .sec-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px
    }

    .badge {
      font-size: 11px;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
      margin-right: 3px
    }

    .tag-scrum {
      background: rgba(124, 58, 237, .15);
      color: var(--accent2)
    }

    .tag-pmp {
      background: rgba(168, 85, 247, .15);
      color: #d8b4fe
    }

    .tag-waterfall {
      background: rgba(59, 130, 246, .15);
      color: #93c5fd
    }

    .tag-agile {
      background: rgba(16, 185, 129, .15);
      color: #6ee7b7
    }

    .tag-spiral {
      background: rgba(251, 191, 36, .15);
      color: #fbbf24
    }

    .tag-bmm {
      background: rgba(236, 72, 153, .15);
      color: #f9a8d4
    }

    .tag-ishi {
      background: rgba(239, 68, 68, .15);
      color: #fca5a5
    }

    .tag-easy {
      background: rgba(34, 197, 94, .15);
      color: var(--ok)
    }

    .tag-med {
      background: rgba(245, 158, 11, .15);
      color: var(--warn)
    }

    .tag-hard {
      background: rgba(239, 68, 68, .15);
      color: var(--err)
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      transition: all .2s
    }

    .btn-p {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(124, 58, 237, .3)
    }

    .btn-p:hover {
      background: #6d28d9;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(124, 58, 237, .4)
    }

    .btn-s {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--txt2)
    }

    .btn-s:hover {
      border-color: var(--accent);
      color: var(--txt)
    }

    .btn-ok {
      background: rgba(16, 185, 129, .12);
      border: 1px solid var(--ok);
      color: var(--ok)
    }

    .btn-err {
      background: rgba(239, 68, 68, .12);
      border: 1px solid var(--err);
      color: var(--err)
    }

    .btn-warn {
      background: rgba(245, 158, 11, .12);
      border: 1px solid var(--warn);
      color: var(--warn)
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px
    }

    .f-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--txt2);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all .2s;
      font-family: var(--font)
    }

    .f-btn:hover,
    .f-btn.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .hl {
      background: rgba(245, 158, 11, .3);
      color: var(--warn);
      border-radius: 2px;
      padding: 0 2px
    }

    .card {
      background: var(--panel);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .2);
      transition: all .3s cubic-bezier(0.25, 0.8, 0.25, 1)
    }

    .card:hover {
      border-color: rgba(191, 90, 242, .4);
      box-shadow: 0 12px 40px rgba(191, 90, 242, .15);
      transform: translateY(-3px) scale(1.01)
    }

    .opt-btn {
      width: 100%;
      text-align: left;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--txt);
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
      transition: all .2s;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 7px
    }

    .opt-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent2)
    }

    .opt-btn:disabled {
      cursor: default
    }

    .opt-btn.correct {
      border-color: var(--ok) !important;
      background: rgba(16, 185, 129, .1);
      color: var(--ok);
      animation: correctPop .3s ease
    }

    .opt-btn.wrong {
      border-color: var(--err) !important;
      background: rgba(239, 68, 68, .1);
      color: var(--err);
      animation: wrongShake .35s ease
    }

    .opt-btn.revealed {
      border-color: var(--ok) !important;
      background: rgba(16, 185, 129, .07);
      color: var(--ok)
    }

    @keyframes correctPop {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.01)
      }

      100% {
        transform: scale(1)
      }
    }

    @keyframes wrongShake {

      0%,
      100% {
        transform: translateX(0)
      }

      20% {
        transform: translateX(-5px)
      }

      40% {
        transform: translateX(5px)
      }

      60% {
        transform: translateX(-3px)
      }

      80% {
        transform: translateX(3px)
      }
    }

    .opt-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 3px;
      margin-left: auto;
      flex-shrink: 0;
      white-space: nowrap
    }

    .opt-badge.ok {
      background: rgba(16, 185, 129, .2);
      color: var(--ok)
    }

    .opt-badge.bad {
      background: rgba(239, 68, 68, .2);
      color: var(--err)
    }

    .expl {
      margin-top: 12px;
      padding: 12px;
      background: rgba(124, 58, 237, .07);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
      font-size: 13px;
      color: var(--txt2);
      display: none
    }

    .expl.show {
      display: block
    }

    .trap-note {
      margin-top: 8px;
      padding: 9px;
      background: rgba(245, 158, 11, .08);
      border-left: 3px solid var(--warn);
      border-radius: 0 6px 6px 0;
      font-size: 12px;
      color: var(--warn);
      display: none
    }

    .trap-note.show {
      display: block
    }

    .q-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 12px 0
    }

    .qn-btn {
      width: 32px;
      height: 32px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--txt2);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: all .2s
    }

    .qn-btn.cur {
      border-color: var(--accent);
      background: rgba(124, 58, 237, .2);
      color: var(--accent2)
    }

    .qn-btn.ans {
      border-color: var(--ok);
      background: rgba(16, 185, 129, .15);
      color: var(--ok)
    }

    .qn-btn.bad {
      border-color: var(--err);
      background: rgba(239, 68, 68, .15);
      color: var(--err)
    }

    .qn-btn.bk {
      border-color: var(--accent2)
    }

    .timer {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--warn);
      padding: 4px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px
    }

    .timer.red {
      color: var(--err)
    }

    .fc-arena {
      display: flex;
      justify-content: center;
      perspective: 1200px;
      margin: 20px 0;
      min-height: 280px;
      align-items: center
    }

    .flashcard {
      width: 100%;
      max-width: 680px;
      height: 260px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .5s cubic-bezier(.4, 0, .2, 1);
      cursor: pointer
    }

    .flashcard.flipped {
      transform: rotateY(180deg)
    }

    .fc-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 10px;
      padding: 26px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border: 1px solid var(--border)
    }

    .fc-front {
      background: var(--panel)
    }

    .fc-back {
      background: #0f0f1a;
      transform: rotateY(180deg)
    }

    .fc-lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--txt2);
      margin-bottom: 10px
    }

    .fc-txt {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.6
    }

    .fc-code {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--bg);
      padding: 8px 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      margin-top: 8px;
      text-align: left;
      width: 100%
    }

    .fc-status {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px
    }

    .fcs-btn {
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      transition: all .2s
    }

    .fcs-review {
      background: rgba(239, 68, 68, .15);
      border: 1px solid var(--err);
      color: var(--err)
    }

    .fcs-med {
      background: rgba(245, 158, 11, .15);
      border: 1px solid var(--warn);
      color: var(--warn)
    }

    .fcs-ok {
      background: rgba(16, 185, 129, .15);
      border: 1px solid var(--ok);
      color: var(--ok)
    }

    /* ===== VIP SPLASH SCREEN ===== */
    #splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(15, 15, 24, 0.98), rgba(0, 0, 0, 0.99));
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
      color: #fff
    }

    .splash-content {
      text-align: center;
      animation: splashPop 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      display: flex;
      flex-direction: column;
      align-items: center
    }

    .splash-icon {
      font-size: 80px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 25px rgba(191, 90, 242, 0.6));
      animation: float 3s ease-in-out infinite
    }

    .splash-title {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px
    }

    .splash-sub {
      font-size: 12px;
      color: var(--txt2);
      margin-top: 8px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase
    }

    .splash-loader {
      width: 180px;
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin: 24px auto;
      overflow: hidden
    }

    .splash-loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      animation: loadProgress 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards
    }

    .splash-status-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 16px
    }

    .splash-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--txt2)
    }

    .splash-badge.vip {
      border-color: rgba(191, 90, 242, 0.3);
      background: rgba(191, 90, 242, 0.1);
      color: var(--accent2)
    }

    .enter-btn {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      cursor: pointer;
      backdrop-filter: var(--glass-blur);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      letter-spacing: 1px;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.3s ease, background 0.3s, border-color 0.3s, box-shadow 0.3s;
      opacity: 0;
      pointer-events: none
    }

    .enter-btn:hover {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      transform: translateY(0) scale(1.05);
      box-shadow: 0 10px 25px rgba(94, 92, 230, 0.4)
    }

    .enter-btn:active {
      transform: scale(0.98)
    }

    @keyframes splashPop {
      0% {
        opacity: 0;
        transform: scale(0.85)
      }

      100% {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-10px)
      }
    }

    @keyframes loadProgress {
      0% {
        width: 0%
      }

      100% {
        width: 100%
      }
    }

    /* ===== NEW COLORFUL CHEAT SHEET (T-SQL style) ===== */
    .cheat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 16px;
    }

    .cc {
      background: var(--panel);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      break-inside: avoid;
      transition: all .3s ease;
    }

    .cc-h {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .copy-btn {
      padding: 4px 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--txt2);
      cursor: pointer;
      font-size: 11px;
      font-family: var(--font);
      font-weight: 600;
      transition: all .2s;
    }

  <script>
    /* ===== DATA: 167 QCM ===== */
    const Q = [
      { id: 1, ch: "Waterfall", diff: "easy", domain: "Modèles", q: "Quelle est la caractéristique PRINCIPALE qui distingue le modèle en cascade (Waterfall) des modèles adaptatifs ?", opts: ["Il utilise des itérations courtes et régulières", "Le découpage est séquentiel et le cahier des charges ne change pas après établissement", "Il implique fortement le client à chaque étape", "Il analyse les risques avant chaque phase"], ans: 1, expl: "Le Waterfall est prédictif : découpage séquentiel, planification définie dès le début, cahier des charges figé. L'effet tunnel isole l'équipe des changements environnementaux.", trap: "Piège : 'implique fortement le client' est l'opposé du Waterfall — c'est une caractéristique Agile." },
      { id: 2, ch: "Waterfall", diff: "med", domain: "Modèles", q: "Un chef de projet déclare : 'Notre modèle garantit une bonne documentation, des coûts estimables et des phases clairement définies, mais nous détectons les erreurs très tard.' De quel modèle parle-t-il ?", opts: ["Modèle en Spirale", "Gestion Adaptative (APF)", "Modèle en Cascade (Waterfall)", "Scrum"], ans: 2, expl: "Ce sont exactement les avantages ET l'inconvénient majeur du Waterfall : bonne documentation, coûts estimables, mais détection d'erreurs uniquement à la fin — ce qui est son défaut critique.", trap: "Piège : 'coûts estimables' peut faire penser à un modèle rigide non-agile ; ici c'est bien Waterfall." },
      { id: 3, ch: "CycleV", diff: "med", domain: "Modèles", q: "Dans le Cycle en V, quelle est la relation fondamentale entre la phase 'Conception Générale' et sa phase de test correspondante ?", opts: ["La conception générale est testée par des tests unitaires", "La conception générale est validée par des tests d'intégration système", "La conception générale n'a pas de phase de test associée", "La conception générale est testée uniquement par le client final"], ans: 1, expl: "Le Cycle en V associe chaque phase de gauche à une phase de test symétrique à droite. Conception Générale ↔ Tests d'intégration système. C'est le principe fondateur du modèle.", trap: "Piège : ne pas confondre tests unitaires (liés à la conception détaillée) et tests d'intégration (liés à la conception générale)." },
      { id: 4, ch: "Spirale", diff: "hard", domain: "Modèles", q: "Dans le modèle en Spirale, après l'analyse des risques et la création d'un prototype, le client peut prendre 3 décisions. Lesquelles sont correctes ?", opts: ["Accepter, Modifier l'objectif, Annuler le projet", "Accepter, Refuser définitivement, Migrer vers Waterfall", "Valider, Ignorer les risques, Reporter", "Accepter uniquement si le prototype est parfait"], ans: 0, expl: "Le client en Spirale peut : Accepter (continuer), Modifier l'objectif (ajuster), ou Annuler le projet (stopper). Ces 3 options reflètent le contrôle client à chaque cycle.", trap: "Piège : 'Refuser définitivement' n'est pas une option distincte — l'annulation est différente d'un simple refus." },
      { id: 5, ch: "Spirale", diff: "med", domain: "Modèles", q: "Pour quel type de projet le modèle en Spirale est-il SPÉCIFIQUEMENT conçu, selon le cours ?", opts: ["Projets simples avec besoins clairs", "Projets complexes avec gestion des risques", "Projets avec équipes distribuées uniquement", "Projets à budget illimité"], ans: 1, expl: "Le modèle en Spirale est dédié aux projets complexes. Il intègre une analyse régulière des risques et des prototypes à chaque cycle pour diminuer l'incertitude progressivement.", trap: "Piège : 'équipes distribuées' concerne l'organisation d'équipe, pas le choix du modèle." },
      { id: 6, ch: "Agile", diff: "easy", domain: "Modèles", q: "Quelle est la définition correcte de la Gestion Adaptative de Projet (APF) ?", opts: ["Un ensemble de règles fixes pour gérer les projets techniques", "Une façon de gérer un projet en acceptant que les besoins changent, divisé en cycles avec évaluation à chaque fin", "Un modèle séquentiel amélioré avec validation client", "Un framework identique à Scrum avec des cérémonies différentes"], ans: 1, expl: "L'APF accepte l'évolution des besoins. Le projet est divisé en mini-projets (cycles), chacun se terminant par une évaluation pour améliorer le suivant avec des checkpoints réguliers.", trap: "Piège : APF n'est PAS identique à Scrum — c'est un cadre général, Scrum est un framework spécifique." },
      { id: 7, ch: "Agile", diff: "med", domain: "Modèles", q: "Un projet d'IA présente des besoins qui évoluent après chaque test de modèle. L'équipe répète analyse → test → validation → affinement. Quel modèle appliquent-ils ?", opts: ["Modèle Incrémental", "Gestion Itérative", "Modèle en Spirale", "Waterfall amélioré"], ans: 1, expl: "La Gestion Itérative consiste à répéter plusieurs fois le même processus jusqu'à atteindre l'objectif. Elle est utilisée quand le problème n'est pas clair dès le début — typique des projets IA.", trap: "Piège : le Modèle Incrémental ajoute des fonctionnalités distinctes, l'Itératif affine la même solution." },
      { id: 8, ch: "Agile", diff: "hard", domain: "Modèles", q: "En Gestion Incrémentale, parmi ces affirmations, lesquelles sont TOUTES correctes ?", opts: ["Chaque incrément est optionnel et peut rester non fonctionnel", "Chaque incrément doit être testé, opérationnel, et on a une vision du Produit Final dès le début", "On n'a aucune vision du produit final avant le dernier incrément", "Les incréments peuvent être dans n'importe quel ordre"], ans: 1, expl: "L'Incrémental impose : (1) chaque incrément testé et opérationnel, (2) vision du Produit Final dès le début. C'est la différence avec l'Itératif où le but évolue.", trap: "Piège : 'vision du PF dès le début' est une règle clé qui distingue Incrémental de Itératif." },
      { id: 9, ch: "Waterfall", diff: "hard", domain: "Modèles", q: "L'effet tunnel dans le modèle Waterfall signifie que :", opts: ["L'équipe travaille dans l'obscurité sans éclairage", "Tout changement dans l'environnement n'affecte pas le cycle car l'équipe est isolée dans son processus", "Le projet avance trop vite sans vérification", "Le client ne peut pas communiquer avec l'équipe par manque d'outils"], ans: 1, expl: "L'effet tunnel = isolation du projet : les changements externes (marché, technologie, besoins) n'impactent pas le cycle en cours. C'est un défaut majeur du Waterfall.", trap: "Piège : ce n'est pas une métaphore visuelle — c'est une isolation processuelle." },
      { id: 10, ch: "BMM", diff: "med", domain: "Stratégie", q: "Dans le Business Motivation Model (BMM), quelle est la relation entre 'Objectif Métier' et 'Stratégie' ?", opts: ["La stratégie définit l'objectif métier", "L'objectif métier est la raison d'être du projet ; la stratégie est l'ensemble d'objectifs pour réaliser cet objectif", "Ce sont deux éléments indépendants sans relation", "La stratégie remplace l'objectif métier dans les projets agiles"], ans: 1, expl: "Dans le BMM : l'Objectif Métier répond à 'Pourquoi ce projet ?' et la Stratégie est l'ensemble d'objectifs métier pour réaliser cet objectif, avec déclinaison Long Terme (Stratégique) et Court Terme (Tactique).", trap: "" },
      { id: 11, ch: "Ishikawa", diff: "easy", domain: "Stratégie", q: "Le diagramme d'Ishikawa est aussi appelé :", opts: ["Diagramme de Gantt", "Diagramme en arêtes de poisson", "Diagramme de flux", "Diagramme de Venn"], ans: 1, expl: "Aussi appelé 'diagramme en arêtes de poisson' en raison de sa forme visuelle, ou 'diagramme causes-effets'. Il visualise les causes potentielles d'un problème spécifique.", trap: "" },
      { id: 12, ch: "Ishikawa", diff: "med", domain: "Stratégie", q: "Selon la règle d'or du diagramme d'Ishikawa, combien d'effets peut-on analyser par diagramme ?", opts: ["Autant que nécessaire", "Un seul effet par diagramme", "Maximum 6 effets, un par catégorie", "Deux effets : primaire et secondaire"], ans: 1, expl: "Règle d'or : UN SEUL effet par diagramme. L'effet est le problème à analyser (ex: 'Mauvaise exploitation des données'). Mettre plusieurs effets dilue l'analyse.", trap: "Piège : les 6M sont les catégories de CAUSES, pas d'effets." },
      { id: 13, ch: "Ishikawa", diff: "hard", domain: "Stratégie", q: "Un projet IA présente un taux de précision faible. Pour la catégorie 'Matières' du diagramme d'Ishikawa, quels exemples sont les plus appropriés ?", opts: ["Manque de formation des développeurs, mauvaise gestion", "Données fausses, données inaccessibles, absence de données", "Pas d'ordinateur, pas de logiciel adéquat", "Mauvaise planification, communication défaillante"], ans: 1, expl: "'Matières' dans les 6M concerne les données et informations : données fausses, inaccessibles ou inexistantes. Pour un projet IA, la qualité des données est une cause directe de précision faible.", trap: "Piège : 'Manque de formation' → Main d'œuvre. 'Pas d'ordinateur' → Matériel. 'Mauvaise planification' → Management." },
      { id: 14, ch: "Scrum", diff: "easy", domain: "Scrum", q: "Dans Scrum, qui est le SEUL responsable du Product Backlog ?", opts: ["Le Scrum Master", "L'équipe de développement collectivement", "Le Product Owner", "Le management de l'entreprise"], ans: 2, expl: "Le Product Owner est le seul responsable du Product Backlog. Il maximise la valeur du produit en gérant, priorisant et ordonnant le backlog selon la valeur business et les dépendances.", trap: "Piège : le SM facilite, l'équipe estime — mais la responsabilité du backlog est exclusivement au PO." },
      { id: 15, ch: "Scrum", diff: "med", domain: "Scrum", q: "Scrum est utilisé pour les projets caractérisés par : besoins flous, nombreux stakeholders, et absence de documentation initiale. Ce cadre est composé de 3 piliers : Rôles, Artifacts et ___.", opts: ["Processus", "Outils", "Cérémonies", "Métriques"], ans: 2, expl: "Scrum = Framework composé de 3 piliers : Rôles (PO, SM, Équipe Dev), Artifacts (Product Backlog, Sprint Backlog, Incrément) et Cérémonies (Sprint Planning, Daily, Review, Rétrospective).", trap: "" },
      { id: 16, ch: "Scrum", diff: "med", domain: "Scrum", q: "Selon les règles Scrum, quelle est la taille correcte de l'équipe de développement ?", opts: ["Minimum 1, maximum 5 membres", "Minimum 3, maximum 9 membres", "Minimum 5, maximum 15 membres", "Aucune limite définie"], ans: 1, expl: "L'équipe Dev Scrum : Min 3 membres (en dessous manque de diversité) Max 9 membres (au-dessus trop de coordination). Le Scrum Master est au minimum 1.", trap: "Piège : ces chiffres sont précis dans le cours — ne pas confondre 3-9 avec d'autres plages." },
      { id: 17, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le Sprint Planning produit 3 outputs. Lequel de ces ensembles est CORRECT ?", opts: ["Sprint Goal, Sprint Backlog, Definition of Done", "Daily Schedule, Sprint Goal, Velocity Report", "Sprint Backlog uniquement", "Product Backlog mis à jour, Sprint Goal, Team Capacity"], ans: 0, expl: "Les 3 outputs du Sprint Planning Meeting : (1) Sprint Backlog, (2) Sprint Goal (but du sprint), (3) Definition of Done (DoD). Ces 3 éléments structurent le sprint.", trap: "Piège : le 'Daily Schedule' et 'Velocity Report' ne sont pas des outputs Scrum officiels." },
      { id: 18, ch: "Scrum", diff: "easy", domain: "Scrum", q: "Quel est l'objectif principal du Daily Scrum (stand-up) ?", opts: ["Présenter l'avancement au client et obtenir sa validation", "Évaluer la performance individuelle de chaque développeur", "Synchroniser les développeurs et ajuster le plan de travail du Sprint", "Planifier les tâches de la semaine suivante"], ans: 2, expl: "Le Daily Scrum = synchronisation de l'équipe Dev + ajustement du plan du Sprint. Ce n'est PAS un rapport au SM ni une évaluation individuelle.", trap: "Piège : 'évaluer la performance individuelle' est un anti-pattern Scrum." },
      { id: 19, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Un incrément Scrum peut avoir 4 états en fin de sprint. Lesquels ?", opts: ["Livré, En cours, Annulé, Reporté", "Fini, À finir, Obsolète (décision PO), Fini avant X jours", "Validé, Non validé, Partiel, Technique", "Terminé, Bugué, En test, Déployé"], ans: 1, expl: "Les 4 états d'un incrément : ✅ Fini, ⚠️ À finir, 🗑️ Obsolète (décision du PO), ⏱️ Fini avant X jours (avance sur planning).", trap: "Piège : 'Obsolète' est une décision du PO uniquement — ni le SM ni l'équipe ne peuvent l'obsolétiser." },
      { id: 20, ch: "Scrum", diff: "med", domain: "Scrum", q: "La Sprint Rétrospective porte sur :", opts: ["Le produit livré et le feedback client", "Le processus uniquement (Process Only) — améliorer comment l'équipe travaille", "Les estimations du prochain sprint", "La revue des bugs détectés pendant le sprint"], ans: 1, expl: "La Rétrospective = Process Only. Elle traite comment l'équipe travaille, pas ce qu'elle livre. Les participants sont PO + SM + Équipe Dev (PAS le client).", trap: "Piège : la Review (pas la Rétro) concerne le produit et implique le client." },
      { id: 21, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le format d'une User Story (US) est 'En tant que [X], je dois [Y], pour [Z]'. Que représente [Z] ?", opts: ["L'acteur concerné par l'action", "L'action technique à effectuer", "La finalité / valeur business de la story", "Le critère d'acceptation de la story"], ans: 2, expl: "Format US : En tant que [Acteur] → qui demande. Je dois [Action] → quoi faire. Pour [Finalité] → pourquoi / valeur apportée. [Z] est la valeur business.", trap: "Piège : [Z] n'est pas le critère d'acceptation — c'est la justification métier." },
      { id: 22, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Lors d'un Sprint Planning, l'équipe sélectionne des US représentant 40 story points mais sa vélocité moyenne est 25. En tant que Scrum Master, quelle est la MEILLEURE action ?", opts: ["Accepter car l'équipe veut se dépasser", "Imposer 25 SP comme limite non négociable", "Rappeler que seule l'équipe peut s'engager sur sa capacité réelle et faciliter une discussion honnête", "Demander au PO de réduire la priorité des stories"], ans: 2, expl: "Le SM facilite et protège — il ne décide pas à la place de l'équipe. L'équipe est la seule responsable de ses engagements. Une discussion honnête sur la capacité réelle est la bonne approche.", trap: "Piège : 'Imposer 25 SP' violerait l'autonomie de l'équipe — le SM n'est pas un manager." },
      { id: 23, ch: "Scrum", diff: "med", domain: "Scrum", q: "La Definition of Done (DoD) est conforme si elle inclut :", opts: ["Uniquement les tests unitaires passés", "Code revu, tests passés (unit/intégration/régression), documentation à jour, sécurité vérifiée, déployable en production", "Validation par le Scrum Master et le Product Owner", "Livraison au client final avec signature"], ans: 1, expl: "La DoD est une checklist de qualité complète : peer review, tests (unit, intégration, régression), documentation (technique + utilisateur), performance, sécurité, accessibilité, déployable en production.", trap: "Piège : la DoD n'est pas validée par le SM — c'est un standard défini par l'équipe." },
      { id: 24, ch: "Scrum", diff: "easy", domain: "Scrum", q: "Le Product Backlog est :", opts: ["Une liste fixe définie une fois en début de projet", "Une liste dynamique des exigences métier, priorisée par le PO selon valeur business et dépendances", "Un document contractuel signé entre client et équipe", "La liste des tâches techniques du sprint en cours"], ans: 1, expl: "Le Product Backlog est dynamique (évolue), complet (toutes les exigences), priorisé par le PO selon : (1) la valeur pour le client et (2) les dépendances entre besoins.", trap: "Piège : 'liste fixe' décrit le cahier des charges Waterfall, pas le Product Backlog Scrum." },
      { id: 25, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Un sprint ne peut PAS être étendu selon les règles Scrum. Quelle est la durée idéale d'un sprint ?", opts: ["1 à 6 semaines selon la complexité", "2 semaines à 4 semaines (idéalement)", "Exactement 1 mois toujours", "Variable selon la vélocité de l'équipe"], ans: 1, expl: "Un sprint dure idéalement entre 2 et 4 semaines. Il n'est JAMAIS extensible. Un sprint Planning pour un sprint d'1 mois = 8h max. Pour 2 semaines = 4h max.", trap: "Piège : la durée peut aller jusqu'à 1 mois légalement en Scrum, mais l'idéal est 2-4 semaines." },
      { id: 26, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le Scrum Master découvre que le Product Owner discute directement avec un développeur pour lui confier des tâches en dehors du Sprint Backlog. Quelle est la PREMIÈRE action du SM ?", opts: ["Ignorer — c'est une collaboration normale", "Parler en privé au PO pour rappeler que toute demande passe par le Product Backlog puis le Sprint Planning", "Mettre fin au sprint immédiatement", "Escalader au management de l'entreprise"], ans: 1, expl: "Le SM protège le processus Scrum. Le PO ne peut pas byepasser le backlog. La première action est une conversation privée avec le PO pour rappeler le cadre — pas d'escalade immédiate.", trap: "Piège : 'mettre fin au sprint' serait disproportionné. Le SM est un leader serviteur, pas un policier." },
      { id: 27, ch: "Scrum", diff: "med", domain: "Scrum", q: "Le Sprint Review (démo) réunit :", opts: ["Scrum Master et Équipe Dev uniquement", "PO, SM, Équipe Dev, et toutes les parties prenantes invitées", "PO et client final uniquement", "Le management et les actionnaires"], ans: 1, expl: "Sprint Review = PO + SM + Équipe Dev + Stakeholders invités. C'est une inspection de l'incrément. Le client et les parties prenantes PEUVENT participer (différent de la Rétro).", trap: "Piège : la Rétro exclut les stakeholders. La Review les inclut." },
      { id: 28, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Qu'est-ce que le 'Backlog Refinement' (grooming) en Scrum ?", opts: ["Une réunion quotidienne de 15 min", "Un processus continu où le PO et l'équipe affinent, estiment et priorisent les items du Product Backlog", "La mise à jour du Sprint Backlog en milieu de sprint", "La création du rapport de vélocité après chaque sprint"], ans: 1, expl: "Le Backlog Refinement est une activité continue (pas une cérémonie officielle Scrum) où l'équipe affine les stories : clarification, décomposition, estimation. Représente ~10% du temps de sprint.", trap: "Piège : ce n'est PAS l'une des 4 cérémonies officielles Scrum." },
      { id: 29, ch: "Scrum", diff: "med", domain: "Scrum", q: "La vélocité d'une équipe Scrum est :", opts: ["La vitesse maximale théorique de l'équipe", "La moyenne des story points livrés par sprint sur les derniers sprints", "Le nombre de tâches complétées par jour", "La capacité en heures disponibles par sprint"], ans: 1, expl: "La vélocité = moyenne des SP livrés (DoD atteinte) sur les derniers sprints (généralement 3). C'est un outil de planification, pas un KPI de performance individuelle.", trap: "Piège : la vélocité n'est PAS une mesure de performance — c'est un outil de planification." },
      { id: 30, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Un développeur senior refuse de partager ses connaissances, créant un silo critique. En tant que Scrum Master, que faites-vous ?", opts: ["Le remplacer immédiatement", "Le signaler au DRH pour sanction", "Faciliter une session de knowledge sharing et explorer en Rétro les obstacles à la collaboration", "Ignorer — chacun peut travailler à sa façon en Scrum"], ans: 2, expl: "Le SM est un facilitateur et coach. Il crée les conditions pour une vraie collaboration. La Rétro est l'outil idéal pour traiter les problèmes d'équipe de manière constructive.", trap: "Piège : le SM n'a pas d'autorité hiérarchique — il ne 'remplace' ni ne 'sanctionne'." },
      { id: 31, ch: "BMM", diff: "hard", domain: "Stratégie", q: "Dans le BMM, quelle est la différence entre une 'Règle Métier' et une 'Politique Métier' ?", opts: ["Ce sont des synonymes", "La règle est actionnable et précise ; la politique est une directive générale dont découlent les règles", "La politique est plus contraignante que la règle", "La règle s'applique aux personnes, la politique aux systèmes"], ans: 1, expl: "Dans le BMM : Politique = directive générale ('assurer la qualité'). Règle = contrainte précise et actionnable ('tout bug critique doit être résolu sous 24h'). Les règles découlent des politiques.", trap: "Piège : ne pas inverser les deux — la politique est le général, la règle est le spécifique." },
      { id: 32, ch: "BMM", diff: "med", domain: "Stratégie", q: "Le BMM sert principalement à :", opts: ["Documenter le code source du logiciel", "Aligner les objectifs métier sur les processus et règles de l'organisation", "Planifier les sprints Scrum", "Gérer les ressources humaines du projet"], ans: 1, expl: "Le BMM est un cadre d'analyse stratégique qui aligne la mission, la vision, les objectifs, les stratégies, les politiques et les règles métier. C'est un outil de gouvernance d'entreprise.", trap: "" },
      { id: 33, ch: "Ishikawa", diff: "med", domain: "Stratégie", q: "Les 6M de l'Ishikawa dans un projet logiciel IA sont : Main d'œuvre, Matières, Méthodes, Machines, Milieu et ___.", opts: ["Mémoire", "Management", "Mise en production", "Marketing"], ans: 1, expl: "Les 6M : Main d'œuvre (équipe), Matières (données), Méthodes (processus/algo), Machines (hardware/cloud), Milieu (environnement), Management (gouvernance/pilotage).", trap: "Piège : 'Mémoire' n'est pas une catégorie 6M — elle serait classée sous 'Machines'." },
      { id: 34, ch: "Ishikawa", diff: "hard", domain: "Stratégie", q: "Pour le problème 'Mauvaise exploitation des données patients en IA médicale', quelle cause appartient à la catégorie 'Méthodes' ?", opts: ["Manque d'experts data scientists", "Données patients non anonymisées", "Absence de pipeline ETL et d'algorithme de nettoyage de données", "Serveurs GPU insuffisants"], ans: 2, expl: "'Méthodes' concerne les processus et algorithmes : absence de pipeline ETL, pas de méthode de nettoyage/normalisation. Les données brutes = Matières. Les GPU = Machines. Les experts = Main d'œuvre.", trap: "" },
      { id: 35, ch: "CycleV", diff: "hard", domain: "Modèles", q: "Dans le Cycle en V, les 'Tests de Recette' correspondent à quelle phase de la branche descendante ?", opts: ["Conception Détaillée", "Conception Générale", "Définition des Besoins / Expression des besoins", "Architecture Système"], ans: 2, expl: "Symétrie du Cycle en V : Tests de Recette ↔ Expression des Besoins (côté client). C'est la validation finale par le client. Tests système ↔ Architecture. Tests intégration ↔ Conception Générale.", trap: "Piège : 'recette' = côté client = besoins initiaux, pas conception." },
      { id: 36, ch: "CycleV", diff: "med", domain: "Modèles", q: "Quel est l'avantage principal du Cycle en V par rapport au Waterfall classique ?", opts: ["Il est plus rapide car il ignore la documentation", "Il intègre la vérification et validation dès la conception, réduisant le coût des corrections", "Il permet de changer les besoins à tout moment", "Il supprime la phase de tests unitaires"], ans: 1, expl: "Le Cycle en V anticipe les phases de test dès la conception. Chaque phase de gauche prépare son test correspondant à droite, réduisant le coût des erreurs détectées tardivement.", trap: "" },
      { id: 37, ch: "Agile", diff: "med", domain: "Modèles", q: "Lequel de ces principes appartient au Manifeste Agile ?", opts: ["La documentation est plus importante que le logiciel fonctionnel", "Suivre un plan plutôt que de s'adapter au changement", "Accueillir favorablement les changements de besoins, même en fin de développement", "Négocier un contrat détaillé avant de commencer"], ans: 2, expl: "4ème valeur du Manifeste Agile : 'Accueillir les changements, même tardifs'. Le Manifeste valorise : Individus, Logiciel fonctionnel, Collaboration client, Adaptation au changement.", trap: "Les 3 autres options sont l'INVERSE des valeurs Agile." },
      { id: 38, ch: "Agile", diff: "hard", domain: "Modèles", q: "La différence fondamentale entre Scrum et Kanban est :", opts: ["Scrum utilise des réunions, Kanban non", "Scrum est basé sur des sprints et des rôles définis ; Kanban est un flux continu sans itérations fixes ni rôles imposés", "Kanban est plus adapté aux petits projets", "Scrum ne peut pas être combiné avec Kanban"], ans: 1, expl: "Scrum : itérations (sprints), rôles (PO/SM/Dev), backlog. Kanban : flux continu, limite de WIP, tableau visuel, pas de rôles imposés. On peut combiner les deux (Scrumban).", trap: "Piège : Scrum ET Kanban peuvent coexister en Scrumban." },
      { id: 39, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Qui peut annuler un sprint en Scrum ?", opts: ["N'importe quel membre de l'équipe", "Le Scrum Master seulement", "Le Product Owner seulement", "L'équipe Dev par vote majoritaire"], ans: 2, expl: "SEUL le Product Owner peut annuler un sprint, en concertation avec les stakeholders. C'est une décision rare, prise si le Sprint Goal devient obsolète ou contradictoire.", trap: "Piège classique : le SM semble avoir ce pouvoir — mais non, c'est le PO." },
      { id: 40, ch: "Scrum", diff: "med", domain: "Scrum", q: "Le Sprint Backlog appartient à :", opts: ["Le Product Owner", "L'entreprise", "L'équipe de développement", "Le Scrum Master"], ans: 2, expl: "Le Sprint Backlog appartient à l'équipe Dev. Seule l'équipe peut modifier son Sprint Backlog pendant le sprint. Le PO n'a pas le droit d'y ajouter des éléments sans accord de l'équipe.", trap: "Piège : le Product Backlog → PO. Le Sprint Backlog → Équipe Dev." },
      { id: 41, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le PO demande en milieu de sprint d'ajouter une fonctionnalité urgente. L'équipe Dev estime que cela dépasse leur capacité. Quelle est la MEILLEURE approche ?", opts: ["Accepter quand même pour satisfaire le PO", "Le SM impose un refus catégorique", "L'équipe et le PO négocient : retirer un item du Sprint Backlog pour faire de la place", "Reporter au prochain sprint sans discussion"], ans: 2, expl: "En Scrum, la capacité de l'équipe est fixe. Si une urgence doit entrer dans le sprint, quelque chose doit sortir. C'est une négociation PO ↔ Équipe (le SM facilite).", trap: "Piège : le SM ne 'refuse' pas — il facilite la conversation entre PO et équipe." },
      { id: 42, ch: "Scrum", diff: "easy", domain: "Scrum", q: "Quelle est la durée maximale du Daily Scrum ?", opts: ["30 minutes", "1 heure", "15 minutes", "Pas de limite"], ans: 2, expl: "Le Daily Scrum est timboxé à 15 minutes maximum. Il se déroule debout pour encourager la concision. Il est destiné aux développeurs (pas au SM ou PO en tant que participants actifs).", trap: "" },
      { id: 43, ch: "Waterfall", diff: "med", domain: "Modèles", q: "Dans quel cas le Waterfall est-il le modèle le PLUS approprié ?", opts: ["Projet IA avec données incertaines", "Développement d'un système embarqué militaire avec spécifications réglementaires figées", "Startup développant un MVP pour tester le marché", "Application mobile avec feedback utilisateur continu"], ans: 1, expl: "Le Waterfall convient aux projets à exigences stables, documentation critique, et environnements réglementés (défense, médical). Les spécifications ne changent pas = Waterfall pertinent.", trap: "Piège : ne pas associer Waterfall à 'simple' — il convient aux projets complexes à exigences STABLES." },
      { id: 44, ch: "Spirale", diff: "hard", domain: "Modèles", q: "Le modèle en Spirale comporte 4 quadrants par cycle. Dans quel ordre se déroulent-ils ?", opts: ["Prototype → Risques → Objectifs → Développement", "Objectifs & Contraintes → Analyse des risques → Développement/Test → Planification suivante", "Planification → Codage → Test → Déploiement", "Besoins → Architecture → Codage → Livraison"], ans: 1, expl: "4 quadrants Spirale : (1) Fixer objectifs/contraintes, (2) Identifier/analyser risques + prototype, (3) Développer et tester, (4) Planifier le cycle suivant. Puis on recommence.", trap: "Piège : 'déploiement' n'est pas un quadrant de la Spirale." },
      { id: 45, ch: "BMM", diff: "hard", domain: "Stratégie", q: "Dans le BMM, 'Vision' et 'Mission' se distinguent par :", opts: ["La vision est externe, la mission est interne", "La vision est ce qu'on VEUT ÊTRE (état futur idéal) ; la mission est ce qu'on FAIT aujourd'hui pour y parvenir", "Ce sont des synonymes interchangeables", "La mission est optionnelle, la vision est obligatoire"], ans: 1, expl: "Vision = état futur idéal ('Être le leader mondial de l'IA santé'). Mission = activité quotidienne pour y parvenir ('Développer des outils IA pour les cliniciens'). Distinction fondamentale en stratégie.", trap: "" },
      { id: 46, ch: "Ishikawa", diff: "hard", domain: "Stratégie", q: "Dans l'Ishikawa, la catégorie 'Milieu' dans un projet logiciel représente :", opts: ["L'environnement de développement (IDE, OS)", "L'environnement externe influençant le projet : culture d'entreprise, réglementation, télétravail, communication", "La qualité du réseau internet de l'équipe", "Les conditions météorologiques"], ans: 1, expl: "'Milieu' = environnement de travail au sens large : culture organisationnelle, contraintes légales (RGPD), conditions de travail, structure d'équipe (distanciel/présentiel), communication.", trap: "Piège : l'IDE et l'OS = 'Machines', pas 'Milieu'." },
      { id: 47, ch: "Scrum", diff: "hard", domain: "Scrum", q: "L'équipe de développement refuse d'estimer les stories en story points. Ils préfèrent estimer en heures. En tant que SM, que faites-vous ?", opts: ["Imposer les story points car c'est la règle Scrum", "Accepter leur choix — Scrum ne prescrit pas un outil d'estimation spécifique", "Escalader au PO pour décision", "Annuler le Sprint Planning"], ans: 1, expl: "Scrum ne prescrit pas Planning Poker ou Story Points spécifiquement. L'équipe peut utiliser n'importe quelle technique d'estimation. Le SM respecte l'autonomie de l'équipe.", trap: "Piège : beaucoup croient que Scrum impose les Story Points — FAUX." },
      { id: 48, ch: "Agile", diff: "med", domain: "Modèles", q: "Le concept 'Time-boxing' en Agile signifie :", opts: ["Travailler plus vite en réduisant les pauses", "Allouer une durée maximale fixe à chaque activité/événement, même si non terminée", "Mesurer le temps passé par développeur", "Bloquer du temps pour les réunions managériales"], ans: 1, expl: "Time-boxing = durée maximale fixe et non extensible pour une activité. Exemples Scrum : Sprint (4 sem max), Daily (15 min max), Sprint Planning (8h max pour 1 mois). Si non fini → stop.", trap: "" },
      { id: 49, ch: "Scrum", diff: "easy", domain: "Scrum", q: "Quelle cérémonie Scrum a pour but d'inspecter l'incrément et adapter le Product Backlog ?", opts: ["Daily Scrum", "Sprint Planning", "Sprint Review", "Sprint Rétrospective"], ans: 2, expl: "Sprint Review = inspection de l'incrément (démo) + adaptation du Product Backlog selon les feedbacks. Le PO décide quoi garder, modifier ou retirer du backlog.", trap: "Piège : la Rétro adapte le PROCESSUS. La Review adapte le PRODUIT (backlog)." },
      { id: 50, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Un stakeholder important veut assister au Daily Scrum pour 'surveiller l'avancement'. En tant que SM, que faites-vous ?", opts: ["L'autoriser — plus de visibilité est toujours bénéfique", "L'inviter mais lui demander d'observer sans intervenir", "Lui expliquer que le Daily est réservé aux développeurs et lui proposer la Sprint Review pour le suivi", "Le laisser décider car c'est un stakeholder important"], ans: 2, expl: "Le Daily Scrum est pour les développeurs. Les observateurs externes (dont SM et PO) peuvent assister mais ne participent pas. Pour les stakeholders, la Sprint Review est le moment approprié.", trap: "Piège : même le SM ne 'mène' pas le Daily — les développeurs s'auto-organisent." },
      { id: 51, ch: "Scrum", diff: "hard", domain: "Scrum", q: "L'équipe Dev a terminé toutes ses US du Sprint Backlog à J+8 (sprint de 2 semaines). Que doit-elle faire ?", opts: ["Prendre le reste du sprint en repos mérité", "Attendre la Sprint Review sans rien faire", "Prendre les prochaines stories du Product Backlog en accord avec le PO", "Clôturer le sprint immédiatement"], ans: 2, expl: "Si l'équipe finit avant la fin du sprint, elle prend les prochains items du Product Backlog par ordre de priorité, en accord avec le PO. Le sprint ne se termine pas en avance.", trap: "Piège : 'clôturer le sprint' avant sa fin n'est pas autorisé selon Scrum." },
      { id: 52, ch: "Scrum", diff: "med", domain: "Scrum", q: "Le Scrum Master est avant tout :", opts: ["Un chef de projet qui planifie et dirige l'équipe", "Un manager RH qui évalue les développeurs", "Un leader serviteur qui protège l'équipe et facilite le processus Scrum", "Un architecte technique qui valide les solutions"], ans: 2, expl: "Le SM est un 'Servant Leader' : il sert l'équipe (élimination des obstacles), protège le processus Scrum, et coache toute l'organisation sur Agile. Pas de hiérarchie sur l'équipe.", trap: "Piège : le SM n'est PAS un chef de projet." },
      { id: 53, ch: "Scrum", diff: "hard", domain: "Scrum", q: "INVEST est un acronyme pour évaluer la qualité des User Stories. Que signifie le 'N' ?", opts: ["Négociable — les détails sont ajustables entre PO et équipe", "Numérotée — chaque US a un identifiant unique", "Neutre — sans biais technologique", "Normalisée — selon un format standard"], ans: 0, expl: "INVEST = Independent (indépendante), Negotiable (négociable), Valuable (de valeur), Estimable, Small (petite), Testable. Le 'N' = Negotiable : les détails sont discutables.", trap: "Piège : 'négociable' ne veut pas dire que la valeur business est négociable — les détails d'implémentation le sont." },
      { id: 54, ch: "Scrum", diff: "med", domain: "Scrum", q: "La 'Definition of Ready' (DoR) signifie qu'une User Story est :", opts: ["Terminée et livrée au client", "Prête à entrer dans un sprint : suffisamment claire, estimée et testable", "Approuvée par le management", "Deployée en production"], ans: 1, expl: "DoR = critères qu'une US doit remplir pour être 'prête' à être sélectionnée en Sprint Planning : claire, estimée, testable (critères d'acceptation définis), réalisable en un sprint.", trap: "Piège : DoR (prête pour sprint) ≠ DoD (terminée et livrée)." },
      { id: 55, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Un développeur propose une solution technique que le PO refuse car elle ne correspond pas à sa vision. En Scrum, qui a le dernier mot sur les décisions TECHNIQUES ?", opts: ["Le Product Owner", "Le Scrum Master", "L'équipe de développement", "Le client"], ans: 2, expl: "L'équipe Dev est auto-organisée et propriétaire des décisions techniques. Le PO définit le QUOI (priorités produit), l'équipe définit le COMMENT (architecture, solutions). Le PO ne peut pas imposer une solution technique.", trap: "Piège : le PO a autorité sur le backlog et les priorités — PAS sur les choix techniques." },
      { id: 56, ch: "CycleV", diff: "hard", domain: "Modèles", q: "Dans le Cycle en V, les tests unitaires sont liés à :", opts: ["L'expression des besoins", "La conception générale", "La conception détaillée", "L'intégration système"], ans: 2, expl: "Cycle en V symétrie : Tests unitaires ↔ Conception Détaillée. Tests d'intégration ↔ Conception Générale. Tests système ↔ Architecture. Tests recette ↔ Besoins.", trap: "" },
      { id: 57, ch: "Waterfall", diff: "hard", domain: "Modèles", q: "Dans un projet Waterfall, des erreurs de spécification sont détectées en phase de tests. Quel est le principal impact ?", opts: ["Aucun impact car les tests sont là pour ça", "Coût minimal car on est en fin de projet", "Coût élevé : il faut revenir aux phases de spécification, conception et redévelopper — effet domino", "On annule simplement les tests problématiques"], ans: 2, expl: "C'est l'effet tunnel du Waterfall : les erreurs de spécification détectées tard engendrent un retour en arrière sur toutes les phases intermédiaires. Coût exponentiel selon la règle des 10× par phase.", trap: "" },
      { id: 58, ch: "Agile", diff: "med", domain: "Modèles", q: "Quel est l'avantage principal des modèles Agile pour les projets à besoins changeants ?", opts: ["Moins de documentation à produire", "Feedback client fréquent permettant d'ajuster le produit à chaque itération", "Équipes plus petites", "Pas besoin de tests"], ans: 1, expl: "L'Agile permet d'intégrer les changements grâce aux cycles courts (sprints) avec feedback client régulier. Le produit évolue selon les besoins réels plutôt qu'une spécification initiale figée.", trap: "" },
      { id: 59, ch: "BMM", diff: "med", domain: "Stratégie", q: "Dans le BMM, les 'Facteurs d'influence' incluent :", opts: ["Uniquement les concurrents directs", "Environnement technologique, réglementaire, concurrentiel, et interne à l'organisation", "Les bugs du système d'information", "Les user stories non réalisées"], ans: 1, expl: "Les facteurs d'influence BMM sont internes (culture, capacités) et externes (marché, technologie, réglementation, concurrence). Ils influencent la stratégie et les décisions métier.", trap: "" },
      { id: 60, ch: "Ishikawa", diff: "hard", domain: "Stratégie", q: "L'Ishikawa est utilisé en phase de :", opts: ["Livraison uniquement", "Planification des sprints", "Analyse de problème et identification des causes racines", "Développement du code"], ans: 2, expl: "L'Ishikawa est un outil d'analyse causale utilisé lors de l'identification d'un problème (ex: en rétrospective, en phase d'analyse qualité) pour remonter aux causes racines avant de définir des solutions.", trap: "" },
      { id: 61, ch: "Scrum", diff: "hard", domain: "Scrum", q: "En planning poker, l'équipe estime une US : 2 développeurs disent 3 SP, 1 dit 13 SP. Que fait-on ?", opts: ["Prendre la moyenne : 6.3 SP", "Prendre la valeur médiane : 3 SP", "Le développeur ayant dit 13 explique sa perspective — discussion puis nouvelle estimation", "Imposer 3 car c'est la majorité"], ans: 2, expl: "Quand il y a divergence, celui qui a l'estimation la plus haute (et la plus basse) explique sa vision. La discussion fait souvent émerger des risques cachés. Puis revote. C'est l'intérêt du planning poker.", trap: "Piège : moyenner ou imposer la majorité = perdre l'information contenue dans la divergence." },
      { id: 62, ch: "Scrum", diff: "easy", domain: "Scrum", q: "Le Product Owner priorise le Product Backlog selon :", opts: ["L'ordre alphabétique des fonctionnalités", "La valeur business ET les dépendances techniques entre items", "L'ancienneté des demandes", "La difficulté estimée par l'équipe"], ans: 1, expl: "Le PO priorise selon : (1) valeur pour le client/business (ROI, impact) et (2) dépendances entre items (certaines fonctionnalités en bloquent d'autres).", trap: "" },
      { id: 63, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Deux équipes Scrum travaillent sur le même produit. Qui définit le cadre de coordination entre elles ?", opts: ["Chaque équipe se coordonne librement", "Le management impose la méthode", "Un framework de scaling comme SAFe ou LeSS définit la coordination inter-équipes", "Le Scrum Master de l'équipe la plus ancienne"], ans: 2, expl: "Pour plusieurs équipes Scrum sur un même produit, des frameworks de scaling sont nécessaires : SAFe (Scaled Agile Framework), LeSS (Large-Scale Scrum), Nexus. Ils définissent la coordination.", trap: "" },
      { id: 64, ch: "Agile", diff: "med", domain: "Modèles", q: "Un 'Epic' en Agile est :", opts: ["Une très petite User Story", "Un groupe de User Stories liées formant une grande fonctionnalité", "Une erreur dans le backlog", "Un sprint de plus de 4 semaines"], ans: 1, expl: "Epic = grande fonctionnalité décomposée en plusieurs User Stories. Hiérarchie : Theme > Epic > User Story > Task. Les Epics sont trop grandes pour un seul sprint.", trap: "" },
      { id: 65, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le 'burn-down chart' montre :", opts: ["Le nombre de bugs par sprint", "Le travail restant (SP ou tâches) dans le sprint ou le projet au fil du temps", "La vélocité cumulée de l'équipe", "Le budget dépensé par rapport au budget initial"], ans: 1, expl: "Burn-down = graphique montrant le travail RESTANT vs temps. Si la courbe descend selon le plan → sprint on track. Si elle reste haute → retard. Outil de visualisation de l'avancement.", trap: "Piège : burn-up montre le travail COMPLÉTÉ. Burn-down montre le RESTANT." },
      { id: 66, ch: "Scrum", diff: "med", domain: "Scrum", q: "L'équipe Dev peut-elle modifier le Sprint Goal en milieu de sprint ?", opts: ["Oui, si le PO le demande", "Oui, si la complexité dépasse les estimations", "Non, le Sprint Goal est fixe — seul le Sprint Backlog peut être ajusté", "Oui, en accord avec le SM"], ans: 2, expl: "Le Sprint Goal est fixe et non modifiable pendant le sprint. C'est le 'pourquoi' du sprint. Seul le Sprint Backlog (le 'comment') peut être ajusté par l'équipe pour atteindre ce goal.", trap: "Piège : Sprint Goal fixe ≠ Sprint Backlog fixe. Le backlog peut s'ajuster, pas le goal." },
      { id: 67, ch: "Waterfall", diff: "med", domain: "Modèles", q: "Dans un projet Waterfall, qui est responsable de valider que les livrables de chaque phase respectent les exigences avant de passer à la suivante ?", opts: ["L'équipe Dev seule", "Le client uniquement", "Le chef de projet et les parties prenantes définies — via des 'gate reviews'", "Le Scrum Master"], ans: 2, expl: "En Waterfall, des 'gate reviews' (jalons de validation) permettent au chef de projet et aux stakeholders de vérifier que chaque phase est complète avant de passer à la suivante.", trap: "" },
      { id: 68, ch: "Spirale", diff: "hard", domain: "Modèles", q: "Dans le modèle en Spirale, qu'est-ce qui distingue un prototype d'un simple livrable intermédiaire ?", opts: ["Le prototype est livré au client final", "Le prototype teste les hypothèses risquées AVANT le développement complet — c'est un outil d'exploration", "Le prototype remplace la documentation technique", "Le prototype est codé en production"], ans: 1, expl: "Le prototype Spirale est un outil d'exploration pour valider des hypothèses et réduire les risques AVANT de s'engager dans un développement complet. Il peut être jeté après validation.", trap: "Piège : prototype ≠ MVP. Un MVP est livrable. Un prototype Spirale est exploratoire." },
      { id: 69, ch: "Agile", diff: "hard", domain: "Modèles", q: "En Agile, 'Fail Fast' signifie :", opts: ["Accepter l'échec total du projet", "Tester rapidement les hypothèses en petits incréments pour apprendre et pivoter avant d'investir massivement", "Ignorer les bugs mineurs", "Livrer même si le produit n'est pas prêt"], ans: 1, expl: "'Fail Fast' = tester des hypothèses rapidement avec un minimum d'investissement pour valider avant de commencer le vrai développement. Exemple : prototype ou MVP en 1 sprint.", trap: "" },
      { id: 70, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Lors d'une Sprint Review, le PO déclare qu'aucune US ne répond à la Definition of Done. Que se passe-t-il ?", opts: ["On accepte quand même les US incomplètes pour le planning", "Ces US ne sont pas intégrées dans l'incrément — elles retournent au Product Backlog", "Le sprint est annulé rétroactivement", "L'équipe est sanctionnée"], ans: 1, expl: "Si des US ne respectent pas la DoD, elles ne sont PAS considérées comme 'Done'. Elles retournent au Product Backlog pour être re-sélectionnées dans un prochain sprint.", trap: "Piège : 'accepter les US incomplètes' violerait la DoD et créerait de la dette technique." },
      { id: 71, ch: "Scrum", diff: "med", domain: "Scrum", q: "Quel artifact Scrum donne la transparence sur tout le travail identifié nécessaire pour atteindre le Product Goal ?", opts: ["Sprint Backlog", "Incrément", "Product Backlog", "Definition of Done"], ans: 2, expl: "Le Product Backlog est l'unique source de vérité pour tout le travail à faire sur le produit. Il donne la transparence maximale sur ce qui reste à accomplir pour atteindre le Product Goal.", trap: "" },
      { id: 72, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le management demande au Scrum Master de fournir un rapport hebdomadaire des heures travaillées par chaque développeur. Que fait le SM ?", opts: ["Fournir le rapport immédiatement", "Refuser catégoriquement et ignorer la demande", "Expliquer que Scrum valorise la transparence sur le résultat (vélocité, burndown) plutôt que le suivi horaire individuel, et proposer des alternatives", "Déléguer au PO"], ans: 2, expl: "Le SM éduque l'organisation sur Agile. Les métriques Scrum = vélocité, burndown, taux de satisfaction DoD — pas les heures individuelles. Il propose des alternatives transparentes sans microgestion.", trap: "" },
      { id: 73, ch: "BMM", diff: "hard", domain: "Stratégie", q: "Dans le BMM, la 'Tactique' se distingue de la 'Stratégie' par :", opts: ["Ce sont des synonymes en gestion de projet", "La stratégie est long terme et globale ; la tactique est court terme et opérationnelle", "La tactique concerne les personnes, la stratégie les systèmes", "La stratégie est définie par le PO, la tactique par le SM"], ans: 1, expl: "BMM : Stratégie = objectifs long terme ('Devenir leader IA santé d'ici 5 ans'). Tactique = actions court terme ('Recruter 3 data scientists ce trimestre'). La tactique sert la stratégie.", trap: "" },
      { id: 74, ch: "Agile", diff: "med", domain: "Modèles", q: "Le concept de 'MVP' (Minimum Viable Product) signifie :", opts: ["Le produit le moins cher possible", "La version minimale d'un produit avec suffisamment de fonctionnalités pour être utilisable et tester une hypothèse marché", "Le produit avec 0 bug", "La première version bêta interne uniquement"], ans: 1, expl: "MVP = version minimale livrable du produit, contenant juste assez de valeur pour être utilisée par de vrais utilisateurs et valider une hypothèse business. Objectif : apprendre avec le moins d'investissement.", trap: "Piège : MVP n'est pas 'de mauvaise qualité' — il est de qualité suffisante pour l'apprentissage." },
      { id: 75, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Une équipe Scrum découvre en milieu de sprint un problème technique bloquant non anticipé. Quelle est la MEILLEURE action immédiate ?", opts: ["Annuler le sprint", "Passer sous silence jusqu'à la Review", "Remonter l'obstacle en Daily Scrum, le SM élimine le blocage, l'équipe réévalue le Sprint Goal si nécessaire", "Attendre la Rétrospective pour en parler"], ans: 2, expl: "Le Daily Scrum est l'endroit pour remonter les obstacles. Le SM agit immédiatement pour les éliminer (Impediment Backlog). Si l'impact est majeur sur le Sprint Goal, le PO est impliqué.", trap: "Piège : 'annuler le sprint' est la décision du PO — pas une réaction à un blocage technique." },
      { id: 76, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le PO est absent pendant 2 sprints. L'équipe ne peut pas clarifier les US. Quelle est la meilleure action du SM ?", opts: ["Continuer sans le PO", "Le SM prend le rôle du PO temporairement", "Alerter le management et escalader pour obtenir une disponibilité PO — le SM ne peut pas remplacer le PO", "Mettre le projet en pause"], ans: 2, expl: "Le SM ne peut PAS cumuler le rôle de PO — ce serait un conflit d'intérêts (SM protège l'équipe, PO défend le produit). Il escalade le problème à l'organisation.", trap: "Piège : le SM ne remplace JAMAIS le PO." },
      { id: 77, ch: "Agile", diff: "med", domain: "Modèles", q: "Qu'est-ce que la 'vélocité normalisée' en Agile ?", opts: ["La vélocité divisée par le nombre de développeurs", "La capacité théorique maximale de l'équipe", "La vélocité ajustée selon l'expérience de l'équipe sur ce type de projet", "La moyenne de vélocité sur l'ensemble du projet"], ans: 3, expl: "La vélocité normalisée tient compte des variations : congés, jours fériés, nouveaux membres. Elle permet une planification plus réaliste que la simple moyenne des derniers sprints.", trap: "" },
      { id: 78, ch: "BMM", diff: "hard", domain: "Stratégie", q: "Dans le BMM, l'élément 'Objectif Opérationnel' se distingue de l'Objectif Stratégique par :", opts: ["L'objectif opérationnel est plus vague", "L'objectif opérationnel est mesurable, court terme et lié à une action quotidienne", "Ce sont des synonymes", "L'objectif stratégique est défini par l'équipe, l'opérationnel par le management"], ans: 1, expl: "Objectif Stratégique = long terme, orienté vision ('Réduire le taux d'abandon de 30% en 2 ans'). Objectif Opérationnel = court terme, mesurable ('Améliorer le temps de chargement de 40% ce trimestre').", trap: "" },
      { id: 79, ch: "Scrum", diff: "hard", domain: "Scrum", q: "La 'dette technique' en Scrum représente :", opts: ["Les heures supplémentaires non payées", "Le coût futur engendré par des raccourcis de développement choisis pour livrer plus vite maintenant", "Les bugs en production", "Le backlog non réalisé"], ans: 1, expl: "La dette technique = choix délibérés de prendre des raccourcis (pas de tests, code non refactorisé) pour livrer vite, créant un 'coût futur' : maintenance difficile, bugs, ralentissement futur.", trap: "Piège : la dette technique peut être intentionnelle (choix conscient) ou non intentionnelle (manque de connaissance)." },
      { id: 80, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Un nouveau manager Agile veut introduire des 'points de performance individuelle' dans les sprints. En tant que SM, quelle est votre réaction ?", opts: ["Excellente idée pour motiver l'équipe", "Acceptable si c'est volontaire", "Expliquer que Scrum favorise la performance collective — les métriques individuelles créent de la compétition et nuisent à la collaboration", "Laisser l'équipe décider"], ans: 2, expl: "Scrum valorise la performance d'équipe et la collaboration. Les métriques individuelles (nombre de tâches, heures) créent de la compétition interne et détruisent la confiance — anti-pattern Agile majeur.", trap: "" },
      { id: 81, ch: "CycleV", diff: "med", domain: "Modèles", q: "Le modèle en V est dit 'dérivé' du Waterfall. Quelle amélioration majeure apporte-t-il ?", opts: ["Il permet de changer les besoins en cours de projet", "Il associe explicitement chaque phase de développement à sa phase de vérification/validation correspondante", "Il supprime les phases de documentation", "Il introduit des itérations courtes"], ans: 1, expl: "Le Cycle en V améliore le Waterfall en définissant DÈS LE DÉBUT les phases de test correspondant à chaque phase de développement. La vérification est planifiée dès la conception.", trap: "" },
      { id: 82, ch: "Agile", diff: "hard", domain: "Modèles", q: "En Agile, 'Inspect and Adapt' (Inspecter et Adapter) est le principe fondamental de :", opts: ["L'estimation en story points", "Les cérémonies Scrum et la boucle d'amélioration continue", "La documentation technique", "La négociation de contrat"], ans: 1, expl: "'Inspect and Adapt' = les cérémonies Scrum sont conçues pour inspecter régulièrement (Daily, Review, Rétro) et adapter (le produit, le processus, le plan). C'est le moteur de l'amélioration continue.", trap: "" },
      { id: 83, ch: "Scrum", diff: "hard", domain: "Scrum", q: "L'équipe Scrum veut adopter Continuous Integration/Continuous Deployment (CI/CD). Qui initie cette décision ?", opts: ["Le PO uniquement", "Le SM uniquement", "L'équipe Dev — c'est une décision technique dans leur domaine d'autonomie", "Le management"], ans: 2, expl: "L'équipe Dev est auto-organisée et propriétaire des pratiques d'ingénierie (CI/CD, TDD, pair programming). Ces décisions techniques sont dans leur périmètre d'autonomie.", trap: "" },
      { id: 84, ch: "Scrum", diff: "easy", domain: "Scrum", q: "Combien de rôles officiels existent dans Scrum ?", opts: ["2 (PO et SM)", "3 (Product Owner, Scrum Master, Équipe Dev)", "4 (PO, SM, Équipe Dev, Architecte)", "5"], ans: 1, expl: "Scrum définit exactement 3 rôles : Product Owner (valeur produit), Scrum Master (processus Scrum), Équipe de Développement (réalisation). Pas plus, pas moins.", trap: "" },
      { id: 85, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Une organisation impose à l'équipe Scrum d'utiliser un outil de gestion de projet spécifique et des templates de rapports rigides. En tant que SM, comment réagissez-vous ?", opts: ["Accepter sans discussion", "Refuser en bloc", "Évaluer l'impact sur l'agilité de l'équipe et négocier des adaptations qui respectent à la fois les contraintes organisationnelles et les principes Scrum", "Ignorer les directives"], ans: 2, expl: "Le SM navigue entre les contraintes organisationnelles et les principes Scrum. Il négocie des compromis qui permettent à l'équipe de rester agile tout en répondant aux besoins légitimes de l'organisation.", trap: "" },
      { id: 86, ch: "Ishikawa", diff: "hard", domain: "Stratégie", q: "Dans un projet de développement logiciel, le problème 'Retard systématique des livraisons' est analysé. Quelle cause relève de 'Management' dans les 6M ?", opts: ["Manque de compétences des développeurs", "Serveurs de build instables", "Absence de processus de planification et de suivi de sprint", "Données de test insuffisantes"], ans: 2, expl: "'Management' dans les 6M concerne : processus de gouvernance, planning, communication décisionnelle, suivi de KPIs. Absence de processus de sprint planning → Management. Compétences → Main d'œuvre.", trap: "" },
      { id: 87, ch: "BMM", diff: "med", domain: "Stratégie", q: "Dans le BMM, les 'Moyens' incluent :", opts: ["Uniquement le budget disponible", "Les ressources, processus, capacités et compétences utilisés pour réaliser la mission", "Les objectifs stratégiques", "Les risques identifiés"], ans: 1, expl: "Les Moyens BMM = tout ce qui est utilisé pour accomplir la mission : ressources humaines, financières, technologiques, processus métier, capacités organisationnelles.", trap: "" },
      { id: 88, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Une User Story est estimée à 20 story points. L'équipe a une vélocité de 25 SP/sprint. Que doit faire le PO ?", opts: ["Forcer l'implémentation en 1 sprint", "Accepter — 20 SP < 25 SP donc réalisable", "Demander à l'équipe de la décomposer en stories plus petites (max 8-13 SP par story idéalement)", "La supprimer du backlog"], ans: 2, expl: "Une story de 20 SP est trop grande même si techniquement sous la vélocité. Elle doit être décomposée en stories indépendantes de 3-8 SP pour faciliter estimation, test et livraison.", trap: "Piège : capacité ≠ taille idéale de story. Une story doit être réalisable en quelques jours, pas un sprint entier." },
      { id: 89, ch: "Agile", diff: "med", domain: "Modèles", q: "La méthode XP (Extreme Programming) est considérée Agile car elle :", opts: ["Utilise uniquement des sprints de 1 semaine", "Met l'accent sur les pratiques d'ingénierie : TDD, pair programming, refactoring, intégration continue", "Ne produit aucune documentation", "Est réservée aux projets de moins de 5 personnes"], ans: 1, expl: "XP = pratiques d'ingénierie Agile : TDD (test d'abord), pair programming, refactoring continu, CI, releases courtes. Complémentaire à Scrum (Scrum = framework de gestion, XP = pratiques techniques).", trap: "" },
      { id: 90, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Le PO déclare que la Sprint Review est 'une perte de temps' et propose de l'annuler. Comment le SM répond-il ?", opts: ["Accepter si le PO le souhaite", "Proposer de la raccourcir à 15 min", "Expliquer que la Sprint Review est une cérémonie Scrum obligatoire : elle inspecte l'incrément, recueille les feedbacks et alimente le Product Backlog", "La rendre optionnelle pour les petits sprints"], ans: 2, expl: "La Sprint Review est obligatoire en Scrum. Elle n'est pas optionnelle. Le SM éduque le PO sur son importance : feedback → adaptation backlog → valeur produit améliorée.", trap: "Piège : aucune cérémonie Scrum n'est optionnelle." },
      { id: 91, ch: "Waterfall", diff: "hard", domain: "Modèles", q: "Un projet Waterfall de 18 mois arrive à la phase de tests. 40% des exigences initiales sont devenues obsolètes. Quelle est la leçon principale ?", opts: ["Les développeurs n'ont pas bien travaillé", "Le modèle Waterfall n'est pas adapté aux environnements à besoins changeants", "Les tests auraient dû être plus rigoureux", "Le chef de projet aurait dû travailler plus vite"], ans: 1, expl: "Ce scénario illustre parfaitement la limite du Waterfall : dans un environnement changeant, un cycle long rend le produit obsolète avant livraison. L'Agile est plus adapté à ce type de contexte.", trap: "" },
      { id: 92, ch: "Scrum", diff: "med", domain: "Scrum", q: "La Rétrospective se termine idéalement par :", opts: ["Un rapport écrit pour le management", "Un ou deux 'actions d'amélioration' concrètes et assignées pour le prochain sprint", "La suppression des items du backlog non réalisés", "Une présentation au client"], ans: 1, expl: "La Rétro se conclut avec des actions concrètes d'amélioration (1-3 max) pour le prochain sprint : qui fait quoi et quand. Pas de liste de 20 points — 1-2 actions réalisables.", trap: "" },
      { id: 93, ch: "Agile", diff: "hard", domain: "Modèles", q: "La loi de Conway stipule que :", opts: ["Les équipes Agile sont toujours plus productives", "Les organisations produisent des systèmes qui reflètent leur structure de communication interne", "Les sprints doivent durer au minimum 2 semaines", "Le Product Owner doit être technique"], ans: 1, expl: "Loi de Conway : 'Les organisations qui conçoivent des systèmes sont contraintes de produire des designs qui reproduisent leur structure de communication.' Implication : l'architecture suit l'org et vice-versa.", trap: "" },
      { id: 94, ch: "Scrum", diff: "easy", domain: "Scrum", q: "Combien de cérémonies officielles Scrum existe-t-il ?", opts: ["3", "5", "4", "6"], ans: 2, expl: "4 cérémonies Scrum officielles : Sprint Planning, Daily Scrum, Sprint Review, Sprint Rétrospective. Le Backlog Refinement est une activité continue, pas une cérémonie officielle.", trap: "Piège : certains comptent 5 en incluant le Sprint lui-même ou le Refinement." },
      { id: 95, ch: "Scrum", diff: "hard", domain: "Scrum", q: "Un développeur affirme que la Rétrospective est inutile car 'on fait toujours la même chose'. En tant que SM, que faites-vous ?", opts: ["Accepter et annuler les prochaines Rétros", "Imposer la Rétro malgré tout", "Explorer avec l'équipe pourquoi les actions d'amélioration ne sont pas suivies d'effets — probablement un problème de suivi ou de confiance psychologique", "Changer le format mais maintenir la cérémonie"], ans: 2, expl: "Si la Rétro semble inefficace, c'est souvent un symptôme : manque de suivi des actions, problème de confiance (sécurité psychologique) ou mauvaise facilitation. Le SM explore ces causes profondes.", trap: "" },
